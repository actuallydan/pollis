[package]
name = "pollis"
version = "1.0.0"
edition = "2021"
rust-version = "1.77"
default-run = "pollis"

[lib]
name = "pollis_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "pollis"
path = "src/main.rs"

[features]
# Default features pull in the self-updater stack. The Mac App Store build
# overrides this with `--no-default-features --features mas` so that
# `tauri-plugin-updater` and the relaunch surface of `tauri-plugin-process`
# are never compiled in — MAS apps must update through the store and are
# rejected if they ship a self-updater.
default = ["updater"]

# Groups the updater-related plugins. Kept separate from `default` so it can
# be disabled cleanly in MAS builds without having to list every other
# default feature.
updater = ["dep:tauri-plugin-updater", "dep:tauri-plugin-process"]

# Mac App Store build flavor. Intentionally empty — its purpose is to be the
# antonym of `updater` so code can branch on `cfg(feature = "mas")`. Any MAS
# build should use `--no-default-features --features mas`.
mas = []

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
tauri-plugin-notification = "2"
tauri-plugin-os = "2"
tauri-plugin-process = { version = "2", optional = true }
tauri-plugin-updater = { version = "2", optional = true }
tauri-plugin-clipboard-manager = "2"
url = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
rusqlite = { version = "0.31", features = ["bundled-sqlcipher"] }
libsql = { version = "0.6", features = ["remote"] }
x25519-dalek = { version = "2.0", features = ["static_secrets", "reusable_secrets"] }
ed25519-dalek = { version = "2.1", features = ["rand_core"] }
curve25519-dalek = "4"
hkdf = "0.12"
sha2 = "0.10"
hmac = "0.12"
aes-gcm = "0.10"
rand = "0.8"
rand_core = { version = "0.6", features = ["getrandom"] }
keyring = { version = "3", features = ["apple-native", "sync-secret-service", "windows-native", "crypto-rust"] }
base64 = "0.22"
hex = "0.4"
ulid = "1"
chrono = { version = "0.4", features = ["serde"] }
jsonwebtoken = "9"
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
anyhow = "1"
dotenvy = "0.15"
thiserror = "1"
once_cell = "1"
zeroize = { version = "1", features = ["derive"] }
livekit = { version = "0.7", features = ["rustls-tls-webpki-roots"] }
libwebrtc = "0.3"
cpal = "0.15"
rodio = { version = "0.19", default-features = false, features = ["wav"] }
image = { version = "0.25", default-features = false, features = ["jpeg", "png", "gif", "webp"] }
blurhash = "0.2"
futures-util = "0.3"
bytes = "1"
openmls = "0.8"
openmls_traits = "0.5"
openmls_rust_crypto = "0.5"
openmls_basic_credential = "0.5"
gethostname = "1.1.0"

[target.'cfg(target_os = "linux")'.dependencies]
webkit2gtk = { version = "2", features = ["v2_38"] }

[target.'cfg(target_os = "macos")'.dependencies]
cocoa = "0.26"
objc = "0.2.7"

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.59", features = ["Win32_Foundation", "Win32_Graphics_Dwm"] }

[profile.dev]
incremental = true

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
