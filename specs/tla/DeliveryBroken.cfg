\* NEGATIVE / TEETH configuration for Spec B -- Delivery / retention.
\* Identical to Delivery.cfg EXCEPT `SoundGC = FALSE`, which guards the
\* retention floor by the FASTEST current member instead of the slowest.
\* That lets GC remove a message a laggard has not yet delivered, so TLC MUST
\* report a NoLossForCurrentMember violation with a concrete counterexample
\* trace. This proves the invariant has teeth (it is not vacuously true).
\*
\* Expected result: TLC FAILS here ("Invariant NoLossForCurrentMember is
\* violated"). The committed default (Delivery.cfg) passes clean.
SPECIFICATION Spec

CONSTANTS
    Keys = {k1}
    Devices = {d1, d2}
    MaxMsgs = 3
    MaxEpoch = 2
    SoundGC = FALSE

INVARIANTS
    TypeOK
    CursorLeqClock
    NoLossForCurrentMember
    AcceptedLossesOnly

PROPERTIES
    CursorMonotone
