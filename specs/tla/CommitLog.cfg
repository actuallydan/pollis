\* Default (SOUND) configuration for Spec A -- CommitLog / epoch machine.
\* Small exhaustive config: 3 clients racing at a head, 3 commit appends, 3
\* epochs. TLC explores the full reachable state space (a few thousand states,
\* well under a second) and all four invariants must PASS -- a fast, definitive
\* PR gate. A deeper sweep (more clients / commits) multiplies the per-client
\* `adopted` map into a far larger space; run that out-of-band, not as the
\* blocking PR check (design doc §3: "CI runs TLC on the small config as a fast
\* gate, a larger config on a schedule").
\*
\* Forward-compat: `Keys` is the abstract head key. A single key here; the PQ
\* (conversation, generation, epoch) extension is modelled by enlarging this
\* set -- a config change, not a spec edit.
SPECIFICATION Spec

CONSTANTS
    Keys = {k1}
    Clients = {c1, c2, c3}
    MaxCommits = 3
    MaxEpoch = 3
    SoundSubmit = TRUE

INVARIANTS
    TypeOK
    OnePerEpoch
    Gapless
    NoForeignAdopt

PROPERTIES
    HeadMonotone
