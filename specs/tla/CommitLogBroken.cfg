\* NEGATIVE / TEETH configuration for Spec A -- CommitLog / epoch machine.
\* Identical to CommitLog.cfg EXCEPT `SoundSubmit = FALSE`, which DROPS the DS
\* conditional-insert guard (`WHERE ?2 = COALESCE(MAX(epoch),-1)+1`): a stale
\* client is allowed to append a commit based on an epoch below the head. Two
\* clients racing at a head then both land a commit at the SAME epoch -- the
\* fork the conditional-insert exists to prevent -- so TLC MUST report a
\* OnePerEpoch violation with a concrete counterexample trace. This proves the
\* invariant has teeth (it is not vacuously true).
\*
\* Expected result: TLC FAILS here ("Invariant OnePerEpoch is violated"). The
\* committed default (CommitLog.cfg) passes clean.
SPECIFICATION Spec

CONSTANTS
    Keys = {k1}
    Clients = {c1, c2, c3}
    MaxCommits = 3
    MaxEpoch = 3
    SoundSubmit = FALSE

INVARIANTS
    TypeOK
    OnePerEpoch
    Gapless
    NoForeignAdopt

PROPERTIES
    HeadMonotone
