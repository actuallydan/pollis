\* Default (SOUND) configuration for Spec B -- Delivery / retention.
\* Small exhaustive config: N=2 devices, K=3 messages, 2 epochs. TLC explores
\* the full reachable state space (~130k states, well under a minute) and all
\* invariants must PASS -- a fast, definitive PR gate. A deeper N=3/K=4 sweep is
\* far larger (the per-device `delivered` set multiplies the space into the
\* millions); run that out-of-band, not as the blocking PR check (design doc §3:
\* "CI runs TLC on the small config as a fast gate, a larger config on a
\* schedule").
\*
\* Forward-compat: `Keys` is the abstract head/retention key. A single key
\* here; the PQ (conversation, generation, epoch) extension is modelled by
\* enlarging this set -- a config change, not a spec edit.
SPECIFICATION Spec

CONSTANTS
    Keys = {k1}
    Devices = {d1, d2}
    MaxMsgs = 3
    MaxEpoch = 2
    SoundGC = TRUE

INVARIANTS
    TypeOK
    CursorLeqClock
    NoLossForCurrentMember
    AcceptedLossesOnly

PROPERTIES
    CursorMonotone
