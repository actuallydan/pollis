# Machine-checked-correctness gate (docs/machine-checked-correctness-design.md).
# Runs the Kani bounded-model-checking proofs on the load-bearing pure functions
# of pollis-core + pollis-delivery.
#   M1 — delivery-watermark no-skip (`next_watermark` in
#        commands/messages/watermark.rs): P1 no-skip / P2 monotone / P3 liveness.
#   M2 — the recovery gate, own-commit canonicalization, and gap detection
#        (`may_rejoin` / `resolve` / `classify` in commands/mls/invariants.rs),
#        plus the DS head arithmetic + accept decision (`head_epoch_of` /
#        `accepts` in pollis-delivery/src/commit.rs). Each has a should_panic
#        mutant proving the harness has teeth.
# Kani builds its own harness toolchain (CBMC backend) and is slow, so this is a
# dedicated job. The proof HARNESSES are pure, but compiling `pollis-core` (even
# `--no-default-features`) still links glib-sys and friends, so the same system
# libs the flows gate installs are required to build the crate before Kani can
# verify it.
name: Kani proofs

on:
  pull_request:
    # Only the pure proof surface matters here. Any change to pollis-core or the
    # workflow itself re-runs the proofs; unrelated surfaces are exempt.
    paths:
      - 'pollis-core/**'
      - '.github/workflows/kani.yml'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: kani-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kani:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # Building pollis-core (even headless) pulls glib-sys / gtk / openssl via
      # transitive deps — the box hides this behind a gtk stub-sysroot, but CI
      # needs the real dev packages. Mirrors mls-tests.yml's install step.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            libasound2-dev \
            libpulse-dev \
            libpipewire-0.3-dev \
            libva-dev \
            libdbus-1-dev \
            cmake \
            clang \
            ninja-build

      # Runs `cargo kani` over pollis-core. The action installs the pinned Kani
      # toolchain (kani-verifier + `cargo-kani setup`, which fetches CBMC) and
      # caches it. `--package pollis-core --lib` scopes to the library target
      # that holds the proof harnesses (the crate's `uniffi-bindgen` bin target
      # needs the `cli` feature and is irrelevant here). `--no-default-features`
      # drops the desktop media stack the harnesses never touch, keeping the
      # verified surface small.
      - name: Run Kani proofs (pollis-core)
        uses: model-checking/kani-github-action@v1
        with:
          args: '--package pollis-core --lib --no-default-features'

      # The I1 DS-side head arithmetic + accept decision live in the Delivery
      # Service crate, so they need a second Kani invocation. `--lib` scopes to
      # the library target (the `pollis-delivery` bin is the axum server, which
      # holds no harnesses). No `--no-default-features` — pollis-delivery has no
      # feature-gated media stack; the harnesses are pure integer reasoning.
      - name: Run Kani proofs (pollis-delivery)
        uses: model-checking/kani-github-action@v1
        with:
          args: '--package pollis-delivery --lib'
