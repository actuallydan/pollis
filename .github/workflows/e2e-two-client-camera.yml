# On-demand two-client 1:1 CAMERA E2E — the camera slice of the media milestone
# (issue #570, M3b). Extends the M3a call job (e2e-two-client-call.yml) with a
# VIRTUAL CAMERA: a v4l2loopback /dev/video0 fed a moving 1280x720 YUYV test
# pattern by ffmpeg, so two real Tauri app instances place + accept a call and
# one turns its webcam on while the other asserts the remote camera tile renders.
# Directly validates the #568 camera-parity work end to end.
#
# Pipeline: install deps → build pollis + pollis-delivery → start-camera →
# start-audio → start-livekit → start-backend → run e2e/two-client-camera.js
# through the shared desktop-e2e composite action → tear everything down (always).
#
# Heavy (two WebKitGTK windows + LiveKit + libsql containers + a kernel-module
# load + a cargo build), so it's manual (workflow_dispatch).
#
# KNOWN RISK: the virtual camera needs the v4l2loopback KERNEL module
# (`modprobe`), which a GitHub-hosted runner MAY refuse (locked-down kernel / no
# matching DKMS headers). start-camera.sh verifies /dev/video0 exists after
# modprobe and FAILS LOUDLY with the modprobe/dmesg error if not, so a failure
# here reads clearly as "v4l2loopback unavailable on this runner" rather than a
# test bug. If it can't run on hosted ubuntu-24.04, a self-hosted runner is the
# fallback.
name: E2E two-client camera (virtual camera + LiveKit)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  two-client-camera:
    # ubuntu-24.04 for the same reason as the other e2e jobs: src-tauri/build.rs
    # compiles pollis-capture-linux, whose libspa 0.9 bindgen needs PipeWire >=
    # 1.0 headers that 24.04 ships and 22.04 doesn't.
    runs-on: ubuntu-24.04
    env:
      CARGO_PROFILE_DEV_DEBUG: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri

      # Shared apt list — identical to the e2e/Dockerfile image and the other
      # e2e workflows. For M3b it also installs v4l-utils + ffmpeg (userspace)
      # and best-effort v4l2loopback-dkms + kernel headers for the virtual camera.
      - name: Install system dependencies
        run: bash e2e/scripts/install-system-deps.sh

      - name: Install meson (newer than apt)
        run: |
          python3 -m pip install --user 'meson>=1.3'
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Clean env (no TURSO_* / POLLIS_DELIVERY_URL / LIVEKIT_* set yet — the
      # fixtures run LATER), so pollis-core/src/config.rs's option_env! bakes
      # nothing in and both binaries read TURSO_URL / POLLIS_DELIVERY_URL /
      # LIVEKIT_URL / R2_* from the RUNTIME env the fixtures inject.
      - name: Build pollis + pollis-delivery (debug)
        run: cargo build -p pollis -p pollis-delivery

      # Virtual camera FIRST — load v4l2loopback + feed a moving YUYV pattern into
      # /dev/video0. VERIFIES the loopback node exists and FAILS LOUDLY with the
      # modprobe error if the runner won't load the module. Exports
      # POLLIS_E2E_CAMERA_DEVICE to $GITHUB_ENV.
      - name: Start virtual camera
        run: bash e2e/scripts/start-camera.sh

      # Virtual audio — a real call join opens cpal mic/playback and fails the
      # join if no device exists. Exports PULSE_SERVER / PULSE_SINK / PULSE_SOURCE.
      - name: Start virtual audio
        run: bash e2e/scripts/start-audio.sh

      # Ephemeral LiveKit (dev mode, loopback). Exports LIVEKIT_URL /
      # LIVEKIT_API_KEY / LIVEKIT_API_SECRET so the DS mints valid tokens and the
      # app dials the right ws URL.
      - name: Start LiveKit
        run: bash e2e/scripts/start-livekit.sh

      # Backend fixtures: libsql + schema + the real pollis-delivery on :8788
      # with DEV_OTP=000000. Picks up LIVEKIT_* from above; writes TURSO_URL /
      # TURSO_TOKEN / POLLIS_DELIVERY_URL / R2 placeholders / DEV_OTP to $GITHUB_ENV.
      - name: Start backend fixtures
        run: bash e2e/scripts/start-backend.sh

      # Two-client 1:1 camera, under the shared composite action (dbus + xvfb +
      # orphan reaping + failure-artifact upload). Both app instances inherit
      # POLLIS_DELIVERY_URL / LIVEKIT_URL / PULSE_* / the /dev/video0 device.
      - name: Run two-client camera e2e (two-client-camera.js)
        uses: ./.github/actions/desktop-e2e
        with:
          command: pnpm two-client-camera
          working-directory: e2e
          artifact-name: e2e-two-client-camera-failure
          artifacts-path: |
            e2e/artifacts/*.png
            e2e/artifacts/*.html

      # Always tear down (idempotent): the DS, the libsql + LiveKit containers,
      # the PulseAudio daemon, and the camera ffmpeg feeder + v4l2loopback module.
      - name: Stop backend fixtures
        if: always()
        run: bash e2e/scripts/stop-backend.sh
