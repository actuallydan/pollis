# On-demand full authenticated E2E: drives the real Tauri app through signup
# end-to-end (email -> dev OTP -> secret key -> PIN -> app-ready) and the
# wrong-OTP rejection path, against a REAL backend stood up in the job — a libsql
# server + the real pollis-delivery binary (issue #570, M1).
#
# Unlike e2e-smoke.yml (login screen only, no backend), this needs a writable DB
# with the schema applied and a running Delivery Service, so it builds
# pollis-delivery too and brings the fixtures up with e2e/scripts/start-backend.sh
# before running e2e/e2e.js and e2e/invalid-otp.js.
#
# Manual trigger only (workflow_dispatch) — a full cargo build of two binaries + a
# libsql container + a real (virtual) WebKitGTK window is heavy; run it from the
# Actions tab (e.g. before a release, or after touching auth / signup / the DS).
# A nightly schedule is intentionally omitted to keep cost down; add one here if
# this becomes a required gate.
name: E2E full (authenticated flow)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full:
    # ubuntu-24.04 for the same reason as e2e-smoke.yml / mls-tests.yml:
    # src-tauri/build.rs compiles pollis-capture-linux, whose libspa 0.9 bindgen
    # needs PipeWire >= 1.0 headers that 24.04 ships and 22.04 doesn't.
    runs-on: ubuntu-24.04
    env:
      CARGO_PROFILE_DEV_DEBUG: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri

      # Shared apt list — identical to the e2e/Dockerfile image and e2e-smoke.yml
      # (issue #570, M0). Dep groups documented in the script itself.
      - name: Install system dependencies
        run: bash e2e/scripts/install-system-deps.sh

      - name: Install meson (newer than apt)
        run: |
          python3 -m pip install --user 'meson>=1.3'
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Clean env (no TURSO_* / POLLIS_DELIVERY_URL set yet — start-backend runs
      # LATER), so pollis-core/src/config.rs's option_env! bakes nothing in and the
      # binaries read TURSO_URL / POLLIS_DELIVERY_URL / R2_* from the RUNTIME env
      # the e2e scripts inject (see e2e/README.md Prerequisites). Both binaries are
      # needed: pollis (the app) and pollis-delivery (the real DS).
      - name: Build pollis + pollis-delivery (debug)
        run: cargo build -p pollis -p pollis-delivery

      # Bring up the backend fixtures: libsql server + schema (via
      # scripts/db-apply.sh) + the real pollis-delivery on :8788 with
      # DEV_OTP=000000. It writes TURSO_URL / TURSO_TOKEN / POLLIS_DELIVERY_URL /
      # R2 placeholders / DEV_OTP to $GITHUB_ENV, so the e2e steps below inherit them.
      - name: Start backend fixtures
        run: bash e2e/scripts/start-backend.sh

      # Full signup flow, under the shared composite action (dbus + xvfb + orphan
      # reaping + failure-artifact upload). It reuses POLLIS_DELIVERY_URL from the
      # step above, so the app talks to the already-running DS instead of spawning
      # its own.
      - name: Run full signup e2e (e2e.js)
        uses: ./.github/actions/desktop-e2e
        with:
          command: pnpm test
          working-directory: e2e
          artifact-name: e2e-full-signup-failure
          artifacts-path: |
            e2e/artifacts/*.png
            e2e/artifacts/FAIL.html

      # Wrong-OTP rejection path, same shared wrapper.
      - name: Run invalid-otp e2e (invalid-otp.js)
        uses: ./.github/actions/desktop-e2e
        with:
          command: pnpm invalid-otp
          working-directory: e2e
          artifact-name: e2e-invalid-otp-failure
          artifacts-path: |
            e2e/artifacts/*.png
            e2e/artifacts/FAIL.html

      # Always tear the backend down (idempotent) so a failed run can't leak the
      # libsql container / DS process onto a reused runner.
      - name: Stop backend fixtures
        if: always()
        run: bash e2e/scripts/stop-backend.sh
