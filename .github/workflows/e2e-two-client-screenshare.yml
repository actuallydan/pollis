# On-demand two-client 1:1 SCREENSHARE E2E — the screenshare slice of the media
# milestone (issue #570, M3c), and the LAST media slice, completing the #568
# voice/video/screenshare surface. Extends the M3a call job
# (e2e-two-client-call.yml) — audio + LiveKit + backend — WITHOUT the camera
# fixture: screenshare needs nothing but the Xvfb display the desktop-e2e
# composite action already provides. Two real Tauri app instances place + accept
# a call, then one SHARES ITS SCREEN and the other asserts the remote
# screenshare tile renders.
#
# On Linux the app captures the X11 ROOT window via xcb + MIT-SHM
# (pollis-capture-linux/src/x11.rs). Under xvfb-run there is a real X server
# ($DISPLAY set) and NO Wayland, so the backend probe (src/linux.rs) selects the
# X11 backend — NO xdg-desktop-portal / PipeWire session is needed (a portal
# ScreenCast backend is not feasible headless). The test also pins
# XDG_SESSION_TYPE=x11 + GDK_BACKEND=x11 on each app process (appEnvFor) to make
# that path explicit. The xcb libs (libxcb1-dev / libxcb-shm0-dev /
# libxcb-randr0-dev) are already in install-system-deps.sh for exactly this
# capture path.
#
# Pipeline: install deps → build pollis + pollis-delivery → start-audio →
# start-livekit → start-backend → run e2e/two-client-screenshare.js through the
# shared desktop-e2e composite action → tear everything down (always).
#
# Heavy (two WebKitGTK windows + LiveKit + libsql containers + a cargo build), so
# it's manual (workflow_dispatch).
name: E2E two-client screenshare (audio + LiveKit + X11 capture)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  two-client-screenshare:
    # ubuntu-24.04 for the same reason as the other e2e jobs: src-tauri/build.rs
    # compiles pollis-capture-linux, whose libspa 0.9 bindgen needs PipeWire >=
    # 1.0 headers that 24.04 ships and 22.04 doesn't.
    runs-on: ubuntu-24.04
    env:
      CARGO_PROFILE_DEV_DEBUG: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri

      # Shared apt list — identical to the e2e/Dockerfile image and the other
      # e2e workflows. It includes pulseaudio (virtual audio) and the xcb libs
      # (libxcb1-dev / libxcb-shm0-dev / libxcb-randr0-dev) the X11 screen
      # capture path links against. No camera fixture is needed for screenshare.
      - name: Install system dependencies
        run: bash e2e/scripts/install-system-deps.sh

      - name: Install meson (newer than apt)
        run: |
          python3 -m pip install --user 'meson>=1.3'
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Clean env (no TURSO_* / POLLIS_DELIVERY_URL / LIVEKIT_* set yet — the
      # fixtures run LATER), so pollis-core/src/config.rs's option_env! bakes
      # nothing in and both binaries read TURSO_URL / POLLIS_DELIVERY_URL /
      # LIVEKIT_URL / R2_* from the RUNTIME env the fixtures inject.
      - name: Build pollis + pollis-delivery (debug)
        run: cargo build -p pollis -p pollis-delivery

      # Virtual audio FIRST — a real call join opens cpal mic/playback and fails
      # the join if no device exists. Exports PULSE_SERVER / PULSE_SINK /
      # PULSE_SOURCE to $GITHUB_ENV so the app step (below) inherits them.
      - name: Start virtual audio
        run: bash e2e/scripts/start-audio.sh

      # Ephemeral LiveKit (dev mode, loopback). Exports LIVEKIT_URL /
      # LIVEKIT_API_KEY / LIVEKIT_API_SECRET to $GITHUB_ENV so the DS (started
      # next) mints valid tokens and the app dials the right ws URL.
      - name: Start LiveKit
        run: bash e2e/scripts/start-livekit.sh

      # Backend fixtures: libsql + schema + the real pollis-delivery on :8788
      # with DEV_OTP=000000. It picks up the LIVEKIT_* env from the step above
      # and forwards it to the DS. Writes TURSO_URL / TURSO_TOKEN /
      # POLLIS_DELIVERY_URL / R2 placeholders / DEV_OTP to $GITHUB_ENV.
      - name: Start backend fixtures
        run: bash e2e/scripts/start-backend.sh

      # Two-client 1:1 screenshare, under the shared composite action (dbus +
      # xvfb + orphan reaping + failure-artifact upload). Both app instances
      # inherit POLLIS_DELIVERY_URL / LIVEKIT_URL / PULSE_* from the steps above,
      # and the X11 $DISPLAY from xvfb-run — the app captures that Xvfb root.
      - name: Run two-client screenshare e2e (two-client-screenshare.js)
        uses: ./.github/actions/desktop-e2e
        with:
          command: pnpm e2e two-client-screenshare
          working-directory: e2e
          artifact-name: e2e-two-client-screenshare-failure
          artifacts-path: |
            e2e/artifacts/*.png
            e2e/artifacts/*.html

      # Always tear down (idempotent): the DS, the libsql + LiveKit containers,
      # and the PulseAudio daemon.
      - name: Stop backend fixtures
        if: always()
        run: bash e2e/scripts/stop-backend.sh
