# On-demand two-client cross-client convergence E2E: launches TWO isolated real
# Tauri app instances against ONE shared backend (a libsql server + the real
# pollis-delivery binary) and proves a message sent by client A converges into
# client B's UI — the first real MLS-through-the-real-renderer, cross-client
# delivery test (issue #570, M2).
#
# Same backend fixtures + composite action as e2e-full.yml (M1): it builds
# pollis + pollis-delivery, brings the backend up with
# e2e/scripts/start-backend.sh (libsql + schema + real DS), runs
# e2e/two-client.js through the shared desktop-e2e action, and tears the backend
# down in an `if: always()` step.
#
# Manual trigger only (workflow_dispatch) — two full WebKitGTK windows + a cargo
# build of two binaries + a libsql container is heavy; run it from the Actions
# tab (e.g. after touching MLS delivery, DMs, or the DS). No nightly schedule
# (cost); add one here if this becomes a required gate.
name: E2E two-client (cross-client convergence)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  two-client:
    # ubuntu-24.04 for the same reason as e2e-full.yml / e2e-smoke.yml:
    # src-tauri/build.rs compiles pollis-capture-linux, whose libspa 0.9 bindgen
    # needs PipeWire >= 1.0 headers that 24.04 ships and 22.04 doesn't.
    runs-on: ubuntu-24.04
    env:
      CARGO_PROFILE_DEV_DEBUG: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri

      # Shared apt list — identical to the e2e/Dockerfile image and the other
      # e2e workflows (issue #570, M0). Dep groups documented in the script.
      - name: Install system dependencies
        run: bash e2e/scripts/install-system-deps.sh

      - name: Install meson (newer than apt)
        run: |
          python3 -m pip install --user 'meson>=1.3'
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Clean env (no TURSO_* / POLLIS_DELIVERY_URL set yet — start-backend runs
      # LATER), so pollis-core/src/config.rs's option_env! bakes nothing in and the
      # binaries read TURSO_URL / POLLIS_DELIVERY_URL / R2_* from the RUNTIME env
      # the e2e scripts inject (see e2e/README.md Prerequisites). Both binaries are
      # needed: pollis (the app, launched twice) and pollis-delivery (the real DS).
      - name: Build pollis + pollis-delivery (debug)
        run: cargo build -p pollis -p pollis-delivery

      # Bring up the backend fixtures: libsql server + schema (via
      # scripts/db-apply.sh) + the real pollis-delivery on :8788 with
      # DEV_OTP=000000. It writes TURSO_URL / TURSO_TOKEN / POLLIS_DELIVERY_URL /
      # R2 placeholders / DEV_OTP to $GITHUB_ENV, so the e2e step below inherits
      # them. two-client.js REQUIRES POLLIS_DELIVERY_URL (it never self-spawns a
      # DS — both clients must share exactly one backend).
      - name: Start backend fixtures
        run: bash e2e/scripts/start-backend.sh

      # Two-client convergence, under the shared composite action (dbus + xvfb +
      # orphan reaping + failure-artifact upload). It reuses POLLIS_DELIVERY_URL
      # from the step above so both app instances talk to the already-running DS.
      - name: Run two-client convergence e2e (two-client.js)
        uses: ./.github/actions/desktop-e2e
        with:
          command: pnpm two-client
          working-directory: e2e
          artifact-name: e2e-two-client-failure
          artifacts-path: |
            e2e/artifacts/*.png
            e2e/artifacts/*.html

      # Always tear the backend down (idempotent) so a failed run can't leak the
      # libsql container / DS process onto a reused runner.
      - name: Stop backend fixtures
        if: always()
        run: bash e2e/scripts/stop-backend.sh
