# Deploy the Delivery Service to PROD — Cloudflare Containers (#515).
#
# Same mechanical path as dev (migrate DBs, Doppler -> Secrets Store, wrangler
# deploy, verify /version) but MANUAL ONLY (workflow_dispatch) and against a
# SEPARATE wrangler config, so a dev merge can never reach prod. No DEV_OTP in
# prod. Migrate-then-ship: pending migrations apply before the new code, so a DS
# deploy no longer needs a coincident desktop-release to land its schema.
name: Deploy Delivery (prod)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (branch, tag, or SHA)
        required: false
        default: main
      force_restart:
        description: Force a container roll with no code change (e.g. after rotating a Doppler/Secrets Store value) — bumps BUILD_NONCE so a new image digest deploys and the container re-reads secrets.
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: delivery-deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: delivery-prod
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      STORE_ID: ${{ vars.SECRETS_STORE_ID }}
      SECRET_PREFIX: DS_PROD_
      WRANGLER_CONFIG: wrangler.prod.jsonc
      VERSION_URL: https://api.pollis.com/version
    steps:
      - name: Checkout ${{ inputs.ref }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve build SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Worker toolchain
        run: pnpm install --filter pollis-delivery-worker

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      # Skip as a green no-op until the env is configured (see dev workflow).
      - name: Deploy configured?
        id: guard
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$DOPPLER_TOKEN" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::CLOUDFLARE_API_TOKEN / DOPPLER_TOKEN not set in the delivery-prod environment — skipping deploy (no-op)."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      # Migrate-then-ship: apply pending DB migrations BEFORE the new DS code goes
      # live, so the service can never run ahead of its schema. The DS writes the
      # new tables a migration adds, so shipping DS code before its migration lands
      # 500s every write — this step closes that ordering hazard structurally.
      # Safe to run here: db-apply.sh is idempotent (tracks schema_migrations) and
      # migrations are additive + backward-compatible, so applying pending ones is
      # a no-op for the still-running old instance. Fail-fast — a failed migration
      # fails the deploy rather than shipping code ahead of its schema. Mirrors
      # desktop-release's two db-apply calls (main dir → main DB, migrations-log →
      # log DB). Uses an admin (DDL-capable) token from Doppler — the DS runtime
      # token may be data-only — falling back to the runtime token where it is
      # full-access (prod's TURSO_TOKEN is full-access).
      - name: Apply pending DB migrations (main + commit-log)
        if: steps.guard.outputs.ok == 'true'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          get()   { doppler secrets get "$1" --plain; }
          admin() { doppler secrets get "$1" --plain 2>/dev/null || get "$2"; }
          echo "── main DB ──"
          TURSO_URL="$(get TURSO_URL)" \
          TURSO_TOKEN="$(admin TURSO_ADMIN_TOKEN TURSO_TOKEN)" \
            ./scripts/db-apply.sh
          echo "── commit-log DB ──"
          TURSO_URL="$(get LOG_DB_URL)" \
          TURSO_TOKEN="$(admin LOG_DB_ADMIN_TOKEN LOG_DB_TOKEN)" \
          MIGRATIONS_DIR=pollis-core/src/db/migrations-log \
            ./scripts/db-apply.sh

      # DOPPLER_TOKEN is a service token scoped to pollis/prd_prod (set in the
      # delivery-prod env). No DEV_OTP synced (INCLUDE_DEV_OTP unset).
      - name: Sync secrets Doppler -> Secrets Store
        if: steps.guard.outputs.ok == 'true'
        working-directory: pollis-delivery
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: bash ../.github/scripts/sync-ds-secrets.sh

      - name: Stamp GIT_SHA into container build args
        if: steps.guard.outputs.ok == 'true'
        working-directory: pollis-delivery
        run: |
          sed -i "s|\"GIT_SHA\": \"unknown\"|\"GIT_SHA\": \"${{ steps.sha.outputs.sha }}\"|" "$WRANGLER_CONFIG"
          # Secret-only rotation: no code change → same image digest → CF won't
          # roll. force_restart bumps BUILD_NONCE to a unique value so a new
          # digest deploys and the container re-reads Secrets Store on restart.
          if [ "${{ inputs.force_restart }}" = "true" ]; then
            sed -i "s|\"BUILD_NONCE\": \"0\"|\"BUILD_NONCE\": \"${{ github.run_id }}\"|" "$WRANGLER_CONFIG"
            echo "force_restart: bumped BUILD_NONCE to force a new image digest"
          fi
          grep -nE '"GIT_SHA"|"BUILD_NONCE"' "$WRANGLER_CONFIG"

      - name: Deploy (wrangler)
        if: steps.guard.outputs.ok == 'true'
        working-directory: pollis-delivery
        run: pnpm exec wrangler deploy -c "$WRANGLER_CONFIG" --containers-rollout immediate

      # The #509 tripwire, kept verbatim: confirm the running binary is the new
      # build before calling the deploy done.
      - name: Verify new image is live
        if: steps.guard.outputs.ok == 'true'
        working-directory: pollis-delivery
        env:
          APP: pollis-delivery-prod
        run: |
          EXPECTED='${{ steps.sha.outputs.sha }}'
          # The old instance now exits promptly on SIGTERM (main.rs shutdown
          # handler), so settle first rather than polling mid-drain and keeping
          # it warm. /version stays authoritative; on a genuine stall we dump the
          # control plane for diagnosis.
          echo "Settling ~8s for the rollout to begin…"; sleep 8
          echo "Waiting for $VERSION_URL to report sha=$EXPECTED"
          for i in $(seq 1 20); do
            GOT="$(curl -fsS -m 10 "$VERSION_URL" | jq -r '.sha' 2>/dev/null || echo '')"
            if [ "$GOT" = "$EXPECTED" ]; then echo "✓ live sha=$GOT"; exit 0; fi
            echo "[$((i*6))s] live sha=$GOT (want $EXPECTED)"; sleep 6
          done
          echo "::error::Delivery (prod) did not report the new SHA in ~120s — the rollout stalled."
          echo "---- control-plane diagnostics ----"
          pnpm exec wrangler containers list || true
          APP_ID="$(pnpm exec wrangler containers list --json 2>/dev/null | jq -r --arg n "$APP" '.[]|select(.name==$n).id' 2>/dev/null || echo '')"
          [ -n "$APP_ID" ] && pnpm exec wrangler containers instances "$APP_ID" || true
          exit 1
