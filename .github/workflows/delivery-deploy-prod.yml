# Deploy the Delivery Service to PROD — Cloudflare Containers (#515).
#
# Same mechanical path as dev (Doppler -> Secrets Store, wrangler deploy, verify
# /version) but MANUAL ONLY (workflow_dispatch) and against a SEPARATE wrangler
# config, so a dev merge can never reach prod. No DEV_OTP in prod.
name: Deploy Delivery (prod)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (branch, tag, or SHA)
        required: false
        default: main

permissions:
  contents: read

concurrency:
  group: delivery-deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: delivery-prod
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      STORE_ID: ${{ vars.SECRETS_STORE_ID }}
      SECRET_PREFIX: DS_PROD_
      WRANGLER_CONFIG: wrangler.prod.jsonc
      VERSION_URL: https://api.pollis.com/version
    steps:
      - name: Checkout ${{ inputs.ref }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve build SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Worker toolchain
        run: pnpm install --filter pollis-delivery-worker

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      # DOPPLER_TOKEN is a service token scoped to pollis/prd_prod (set in the
      # delivery-prod env). No DEV_OTP synced (INCLUDE_DEV_OTP unset).
      - name: Sync secrets Doppler -> Secrets Store
        working-directory: pollis-delivery
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: bash ../.github/scripts/sync-ds-secrets.sh

      - name: Stamp GIT_SHA into container build args
        working-directory: pollis-delivery
        run: |
          sed -i "s|\"GIT_SHA\": \"unknown\"|\"GIT_SHA\": \"${{ steps.sha.outputs.sha }}\"|" "$WRANGLER_CONFIG"
          grep -n '"GIT_SHA"' "$WRANGLER_CONFIG"

      - name: Deploy (wrangler)
        working-directory: pollis-delivery
        run: pnpm exec wrangler deploy -c "$WRANGLER_CONFIG"

      # The #509 tripwire, kept verbatim: confirm the running binary is the new
      # build before calling the deploy done.
      - name: Verify new image is live
        run: |
          EXPECTED='${{ steps.sha.outputs.sha }}'
          echo "Waiting for $VERSION_URL to report sha=$EXPECTED"
          for i in $(seq 1 40); do
            GOT="$(curl -fsS -m 10 "$VERSION_URL" | jq -r '.sha' 2>/dev/null || echo '')"
            if [ "$GOT" = "$EXPECTED" ]; then echo "✓ live sha=$GOT"; exit 0; fi
            echo "[$((i*6))s] live sha=$GOT (want $EXPECTED)"; sleep 6
          done
          echo "::error::Delivery (prod) did not report the new SHA within 240s — the deploy did not take effect."
          exit 1
