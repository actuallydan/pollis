# On-demand two-client DELETE-FOR-EVERYONE E2E: two isolated real Tauri app
# instances against ONE shared backend prove that after A's message CONVERGES
# into B, A deleting it redacts B's already-delivered copy (E2EE MLS-authenticated
# redaction) — through the real renderer + real MLS + real DS.
#
# Backend-only (no media) — same fixtures + composite action as
# e2e-two-client-dm-reply.yml. Manual trigger only (workflow_dispatch): heavy
# (two WebKitGTK windows + a two-binary cargo build + a libsql container).
name: E2E two-client delete-for-everyone

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  two-client-delete:
    # ubuntu-24.04: src-tauri/build.rs compiles pollis-capture-linux, whose
    # libspa 0.9 bindgen needs PipeWire >= 1.0 headers (24.04 ships them).
    runs-on: ubuntu-24.04
    env:
      CARGO_PROFILE_DEV_DEBUG: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri

      - name: Install system dependencies
        run: bash e2e/scripts/install-system-deps.sh

      - name: Install meson (newer than apt)
        run: |
          python3 -m pip install --user 'meson>=1.3'
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Clean env (no TURSO_* / POLLIS_DELIVERY_URL yet — start-backend runs
      # LATER) so config.rs's option_env! bakes nothing in and the binaries read
      # the runtime env the e2e scripts inject.
      - name: Build pollis + pollis-delivery (debug)
        run: cargo build -p pollis -p pollis-delivery

      - name: Start backend fixtures
        run: bash e2e/scripts/start-backend.sh

      - name: Run two-client delete-for-everyone e2e (two-client-delete.js)
        uses: ./.github/actions/desktop-e2e
        with:
          command: pnpm e2e two-client-delete
          working-directory: e2e
          artifact-name: e2e-two-client-delete-failure
          artifacts-path: |
            e2e/artifacts/*.png
            e2e/artifacts/*.html

      - name: Stop backend fixtures
        if: always()
        run: bash e2e/scripts/stop-backend.sh
