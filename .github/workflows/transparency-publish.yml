name: Publish Transparency Log

# Rebuilds the Key Transparency static read API and publishes it to Cloudflare R2
# (served at https://verify.pollis.com). The tree is signed in CI and served as
# static files — there is NO server on the trust path.
#
# What it does, daily (and on demand):
#   1. Cheap early-exit BEFORE any Rust toolchain: compare each published head's
#      tree_size against a live COUNT(*) — mls_commit_log vs the commit-log tree,
#      AND account_key_log vs the account-key tree. Rebuild if EITHER differs (or
#      the account head is absent). Both equal => nothing new, exit success
#      without building. (workflow_dispatch forces a rebuild — that is the
#      "rebuild now" button. A rebuild does NOT re-mint an unchanged tree's STH:
#      each tree reuses the frozen timestamp from its published per-size head
#      unless it has grown, so the head for a given size is byte-stable forever.)
#   2. Build TWO signed bundles from mls_commit_log + account_key_log
#      (STH_SIGNING_KEY) and run `serve generate` to produce the immutable /v1
#      commit-log tree + the separate /v1/account-keys tree, each with its
#      precomputed verify/{group,account}/<id> reports.
#   3. Sync to R2 in two passes with a cache split: immutable artifacts FIRST,
#      then the mutable heads + reports LAST, so a published head never
#      references a missing artifact.
#   4. Post-publish self-audit: build pollis-verify in-job and run it against the
#      live domain so every publish verifies what is actually served, with an
#      across-run STH consistency tripwire (cached via actions/cache) that fails
#      loudly on equivocation.
#
# Required repository secrets (names exact):
#   TURSO_DATABASE_URL, TURSO_AUTH_TOKEN  — main DB: read account_key_log
#   LOG_DB_URL, LOG_DB_AUTH_TOKEN         — log DB: read mls_commit_log (Goal A
#     moved the commit log into its own DB). Optional: when unset, both fall back
#     to the main DB vars (single-DB / pre-cutover behaviour).
#   STH_SIGNING_KEY                       — 32-byte hex Ed25519 log signing key
#   R2_TRANSPARENCY_ACCESS_KEY_ID, R2_TRANSPARENCY_SECRET_ACCESS_KEY,
#   R2_TRANSPARENCY_ENDPOINT, R2_TRANSPARENCY_BUCKET — R2 sync (namespaced:
#   the bare R2_* names are account-wide creds owned by the release workflows)

on:
  schedule:
    # 06:47 UTC daily (off the hour to dodge cron congestion).
    - cron: "47 6 * * *"
  workflow_dispatch:

# Never let two publishes overlap — a half-synced tree must never race another.
concurrency:
  group: transparency-publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish to R2
    runs-on: ubuntu-latest
    env:
      # R2 speaks the S3 API; the aws CLI reads creds from these standard vars.
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_TRANSPARENCY_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_TRANSPARENCY_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      # Cloudflare R2 rejects the integrity checksums newer aws-cli v2 adds by
      # default; only send/verify them when the operation actually requires it.
      AWS_REQUEST_CHECKSUM_CALCULATION: when_required
      AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
    steps:
      # (a) Early-exit BEFORE any toolchain setup: is the published head already
      #     current with the DB? If so we are done — no build, no sync.
      - name: Decide whether a rebuild is needed
        id: decide
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          LOG_DB_URL: ${{ secrets.LOG_DB_URL }}
          LOG_DB_AUTH_TOKEN: ${{ secrets.LOG_DB_AUTH_TOKEN }}
          R2_ENDPOINT: ${{ secrets.R2_TRANSPARENCY_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_TRANSPARENCY_BUCKET }}
        run: |
          set -euo pipefail

          # A manual dispatch is an explicit "rebuild now" — skip the comparison.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — forcing a rebuild."
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Published head tree_sizes (empty if never published / unreachable).
          # The account head 404s until this feature's first publish — an empty
          # value therefore reads as "needs rebuild" below.
          published="$(curl -fsS --max-time 20 https://verify.pollis.com/v1/sth/latest.json \
            | jq -r '.tree_size' 2>/dev/null || echo "")"
          published_acct="$(curl -fsS --max-time 20 https://verify.pollis.com/v1/account-keys/sth/latest.json \
            | jq -r '.tree_size' 2>/dev/null || echo "")"
          published_bin="$(curl -fsS --max-time 20 https://verify.pollis.com/v1/binaries/sth/latest.json \
            | jq -r '.tree_size' 2>/dev/null || echo "")"

          # Live counts via Turso's HTTP (Hrana) pipeline API. The DB URL is
          # libsql://; the HTTP endpoint is the same host over https.
          # Goal A split the data across two DBs: mls_commit_log lives in the log
          # DB, account_key_log stays in the main DB. Each has its own token. When
          # the LOG_DB_* vars are unset both resolve to the main DB (single-DB).
          log_db_url="${LOG_DB_URL:-$TURSO_DATABASE_URL}"
          log_db_token="${LOG_DB_AUTH_TOKEN:-$TURSO_AUTH_TOKEN}"
          to_http() { local u="${1/libsql:\/\//https://}"; echo "${u%/}"; }
          main_http="$(to_http "$TURSO_DATABASE_URL")"
          log_http="$(to_http "$log_db_url")"
          # query_count <http-url> <token> <sql>
          query_count() {
            curl -fsS --max-time 20 "$1/v2/pipeline" \
              -H "Authorization: Bearer $2" \
              -H "Content-Type: application/json" \
              -d "{\"requests\":[{\"type\":\"execute\",\"stmt\":{\"sql\":\"$3\"}},{\"type\":\"close\"}]}" \
              | jq -r '.results[0].response.result.rows[0][0].value'
          }
          # mls_commit_log → log DB; account_key_log → main DB.
          count="$(query_count "$log_http" "$log_db_token" 'SELECT COUNT(*) FROM mls_commit_log')"
          acct_count="$(query_count "$main_http" "$TURSO_AUTH_TOKEN" 'SELECT COUNT(*) FROM account_key_log')"

          # Binaries tree: its source of truth is the accumulating BinaryRecord
          # JSON on R2 (written by desktop-release.yml's attest-and-log job), not
          # a DB table — Phase 1 is file-backed. Its length is the tree's "live"
          # size. Absent object (no releases attested yet) reads as 0.
          bin_count="$(aws s3 cp "s3://${R2_BUCKET}/internal/binary-records.json" - \
            --endpoint-url "${R2_ENDPOINT}" 2>/dev/null | jq 'length' 2>/dev/null || echo 0)"
          [ -n "${bin_count}" ] || bin_count=0

          echo "commit-log:  published ${published:-<none>} | live ${count}"
          echo "account-key: published ${published_acct:-<none>} | live ${acct_count}"
          echo "binaries:    published ${published_bin:-<none>} | live ${bin_count}"

          # The binaries tree is "up to date" if there are no records yet
          # (bin_count 0 → nothing to publish) OR its published head matches the
          # record count. Only force a rebuild on its account when it is behind.
          bin_ok=true
          if [ "${bin_count}" != "0" ]; then
            if [ -z "${published_bin}" ] || [ "${published_bin}" != "${bin_count}" ]; then
              bin_ok=false
            fi
          fi

          # Rebuild if ANY tree is behind (or absent). All must be present AND
          # equal (binaries: current per bin_ok) to skip.
          if [ -n "${published}" ] && [ "${published}" = "${count}" ] \
             && [ -n "${published_acct}" ] && [ "${published_acct}" = "${acct_count}" ] \
             && [ "${bin_ok}" = "true" ]; then
            echo "All trees already up to date — nothing to publish."
            echo "build=false" >> "$GITHUB_OUTPUT"
          else
            echo "build=true" >> "$GITHUB_OUTPUT"
          fi

      # (b) Everything below runs only when a rebuild is actually needed.
      - name: Checkout
        if: steps.decide.outputs.build == 'true'
        uses: actions/checkout@v4

      - name: Install Rust
        if: steps.decide.outputs.build == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        if: steps.decide.outputs.build == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          key: transparency-publish

      # (c) Build the signed bundle, then generate the static tree.
      - name: Build builder + serve
        if: steps.decide.outputs.build == 'true'
        run: cargo build --release --locked -p verifiable-log-builder --bin builder -p verifiable-log-serve --bin serve

      - name: Generate signed static tree
        if: steps.decide.outputs.build == 'true'
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          LOG_DB_URL: ${{ secrets.LOG_DB_URL }}
          LOG_DB_AUTH_TOKEN: ${{ secrets.LOG_DB_AUTH_TOKEN }}
          # The builder's default --signing-key-env. The key never leaves CI.
          VLOG_SIGNING_KEY: ${{ secrets.STH_SIGNING_KEY }}
          # R2: the binaries tree reads its accumulating records JSON from here.
          R2_ENDPOINT: ${{ secrets.R2_TRANSPARENCY_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_TRANSPARENCY_BUCKET }}
        run: |
          set -euo pipefail
          base="https://verify.pollis.com"
          now="$(date +%s%3N)"

          # Goal A split: mls_commit_log lives in the log DB (its own token),
          # account_key_log stays in the main DB. Both fall back to the main DB
          # vars when LOG_DB_* are unset (single-DB / pre-cutover).
          log_db_url="${LOG_DB_URL:-$TURSO_DATABASE_URL}"
          log_db_token="${LOG_DB_AUTH_TOKEN:-$TURSO_AUTH_TOKEN}"

          # An STH for a given (size, root) must be byte-stable across republishes:
          # the per-size head files are immutable, so re-minting them with a fresh
          # timestamp would diverge from what is already published (and would read
          # as two different signed heads for one size). So each tree gets a fresh
          # timestamp ONLY when it has actually grown; an unchanged tree reuses the
          # timestamp frozen in its already-published per-size head, reproducing it
          # exactly. The two trees grow independently (e.g. a new signup advances
          # the account tree while the commit log is unchanged), hence one
          # timestamp each.
          to_http() { local u="${1/libsql:\/\//https://}"; echo "${u%/}"; }
          main_http="$(to_http "$TURSO_DATABASE_URL")"
          log_http="$(to_http "$log_db_url")"
          # live_count <http-url> <token> <sql>
          live_count() {
            curl -fsS --max-time 20 "$1/v2/pipeline" \
              -H "Authorization: Bearer $2" \
              -H "Content-Type: application/json" \
              -d "{\"requests\":[{\"type\":\"execute\",\"stmt\":{\"sql\":\"$3\"}},{\"type\":\"close\"}]}" \
              | jq -r '.results[0].response.result.rows[0][0].value'
          }
          # Reuse the frozen timestamp from a tree's published per-size head when
          # its live row count still matches that head's size; otherwise stamp now.
          frozen_or_now() {
            local size_url="$1" head_url_base="$2" live="$3"
            local pub
            pub="$(curl -fsS --max-time 20 "${size_url}" | jq -r '.tree_size' 2>/dev/null || echo "")"
            if [ -n "${pub}" ] && [ "${pub}" = "${live}" ]; then
              curl -fsS --max-time 20 "${head_url_base}/${pub}.json" | jq -r '.timestamp'
            else
              echo "${now}"
            fi
          }
          # mls_commit_log → log DB; account_key_log → main DB.
          commit_ts="$(frozen_or_now "${base}/v1/sth/latest.json" "${base}/v1/sth" "$(live_count "$log_http" "$log_db_token" 'SELECT COUNT(*) FROM mls_commit_log')")"
          account_ts="$(frozen_or_now "${base}/v1/account-keys/sth/latest.json" "${base}/v1/account-keys/sth" "$(live_count "$main_http" "$TURSO_AUTH_TOKEN" 'SELECT COUNT(*) FROM account_key_log')")"
          echo "commit-log STH ts=${commit_ts}  account-keys STH ts=${account_ts}  (now=${now})"

          # Binaries tree (third tenant): its source of truth is the accumulating
          # BinaryRecord JSON on R2 (written by desktop-release.yml). Pull it; an
          # absent object (no releases attested yet) → empty list → no tree.
          # Its length is the tree's live size, used to reuse a frozen STH ts.
          aws s3 cp "s3://${R2_BUCKET}/internal/binary-records.json" ./binary-records.json \
            --endpoint-url "${R2_ENDPOINT}" 2>/dev/null || echo "[]" > ./binary-records.json
          [ -s ./binary-records.json ] || echo "[]" > ./binary-records.json
          bin_count="$(jq 'length' ./binary-records.json 2>/dev/null || echo 0)"
          [ -n "${bin_count}" ] || bin_count=0
          binaries_ts="$(frozen_or_now "${base}/v1/binaries/sth/latest.json" "${base}/v1/binaries/sth" "${bin_count}")"
          echo "binaries STH ts=${binaries_ts}  (records=${bin_count})"

          # Build BOTH bundles: the commit log AND (via --account-out) the
          # account-key directory — its own tree, signed under its own domain
          # context with the same key. Goal A split: --log-db reads
          # mls_commit_log from the log DB (authenticated by LOG_DB_AUTH_TOKEN,
          # exported so connect_with_token picks it up), while --db keeps reading
          # account_key_log from the main DB (TURSO_AUTH_TOKEN). Both default to
          # the main DB when LOG_DB_* are unset.
          export LOG_DB_AUTH_TOKEN="${log_db_token}"
          ./target/release/builder build \
            --db "${TURSO_DATABASE_URL}" \
            --log-db "${log_db_url}" \
            --out bundle.json --account-out account-bundle.json \
            --timestamp "${commit_ts}" --account-timestamp "${account_ts}"

          # Binaries bundle (third tree) — only when there are records to log. The
          # BinaryInvariant runs inside build-binaries, so a forked / out-of-order
          # / unpaired records set aborts here rather than publishing a bad tree.
          BIN_ARG=()
          if [ "${bin_count}" != "0" ]; then
            ./target/release/builder build-binaries \
              --binaries-in ./binary-records.json \
              --out binaries-bundle.json \
              --timestamp "${binaries_ts}"
            BIN_ARG=(--binaries-bundle binaries-bundle.json)
          else
            echo "no released-binary records yet — skipping the binaries tree"
          fi

          # generate emits every tree into ./site (the account tree under
          # v1/account-keys/ + verify/account/<id>; the binaries tree under
          # v1/binaries/ + verify/release/<tag>, when present).
          ./target/release/serve generate --bundle bundle.json \
            --account-bundle account-bundle.json "${BIN_ARG[@]}" --out ./site
          # The bundles carry hashed commit identities / public keys only — no
          # plaintext — but remove them anyway so they can never be synced. The
          # records JSON is a build input, never part of the published tree.
          rm -f bundle.json account-bundle.json binaries-bundle.json binary-records.json

      # (d) Two-pass R2 sync with the cache split. Immutable artifacts go up
      #     first so the mutable head/reports published last never reference a
      #     missing object. Append-only: never --delete (old immutable artifacts
      #     stay valid forever).
      - name: Configure aws CLI concurrency
        if: steps.decide.outputs.build == 'true'
        run: aws configure set default.s3.max_concurrent_requests 64

      - name: Publish immutable artifacts (pass 1)
        if: steps.decide.outputs.build == 'true'
        env:
          R2_ENDPOINT: ${{ secrets.R2_TRANSPARENCY_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_TRANSPARENCY_BUCKET }}
        run: |
          set -euo pipefail
          # --size-only: immutable artifacts have byte-stable content per path, so
          # comparing size alone skips re-uploading ones already in R2.
          aws s3 sync ./site "s3://${R2_BUCKET}/" \
            --endpoint-url "${R2_ENDPOINT}" \
            --only-show-errors \
            --size-only \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "v1/sth/latest.json" \
            --exclude "v1/index.json" \
            --exclude "verify/group/*" \
            --exclude "v1/account-keys/sth/latest.json" \
            --exclude "v1/account-keys/index.json" \
            --exclude "verify/account/*" \
            --exclude "v1/binaries/sth/latest.json" \
            --exclude "v1/binaries/index.json" \
            --exclude "verify/release/*"

      - name: Publish mutable head + reports (pass 2)
        if: steps.decide.outputs.build == 'true'
        env:
          R2_ENDPOINT: ${{ secrets.R2_TRANSPARENCY_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_TRANSPARENCY_BUCKET }}
        run: |
          set -euo pipefail
          # The moving documents last; --content-type so the extensionless
          # verify/group/<id> files are still served as JSON.
          aws s3 sync ./site "s3://${R2_BUCKET}/" \
            --endpoint-url "${R2_ENDPOINT}" \
            --only-show-errors \
            --content-type "application/json" \
            --cache-control "public, max-age=300" \
            --exclude "*" \
            --include "v1/sth/latest.json" \
            --include "v1/index.json" \
            --include "verify/group/*" \
            --include "v1/account-keys/sth/latest.json" \
            --include "v1/account-keys/index.json" \
            --include "verify/account/*" \
            --include "v1/binaries/sth/latest.json" \
            --include "v1/binaries/index.json" \
            --include "verify/release/*"

      # (e) Post-publish self-audit: verify what is ACTUALLY served at the live
      #     domain (both trees), and run an across-run equivocation tripwire. The
      #     prior run's latest STH for each tree is restored from the cache; a
      #     previously-published immutable STH that changed (or vanished) means
      #     the server rewrote attested history — fail loudly.
      - name: Restore prior published STHs (tripwire state)
        if: steps.decide.outputs.build == 'true'
        uses: actions/cache/restore@v4
        with:
          path: .sth-prev
          # A run-id key always misses; restore-keys then pulls the most recent
          # prior run's cache (cache entries are immutable per key, so each run
          # writes a fresh one and reads the latest older one).
          key: transparency-sth-${{ github.run_id }}
          restore-keys: |
            transparency-sth-

      - name: Build pollis-verify (auditor CLI, cargo already warm)
        if: steps.decide.outputs.build == 'true'
        run: cargo build --release --locked -p verifiable-log-serve --bin pollis-verify

      - name: Self-audit the published log + equivocation tripwire
        if: steps.decide.outputs.build == 'true'
        run: |
          set -euo pipefail
          base="https://verify.pollis.com"

          # (1) Verify what is actually served — BOTH trees. pollis-verify exits
          #     non-zero on any failed signature/proof/consistency check; an
          #     absent account tree is only a warning (won't fail this gate).
          ./target/release/pollis-verify remote "${base}"

          # (2) Across-run equivocation tripwire. Per-size STHs are immutable and
          #     never deleted, so the STH the server published last run at size
          #     S_old must STILL be byte-identical now. A changed root/signature
          #     at S_old, a vanished S_old, or a shrinking latest size all mean
          #     attested history was rewritten — append-only was violated.
          check_tree() {
            name="$1"; prev="$2"; sth_base="$3"; latest_url="$4"
            if [ ! -f "${prev}" ]; then
              echo "${name}: no prior STH cached (first run) — seeding tripwire."
              return 0
            fi
            old_size="$(jq -r '.tree_size' "${prev}")"
            old_root="$(jq -r '.root_hash' "${prev}")"
            old_sig="$(jq -r '.signature' "${prev}")"

            pinned="$(curl -fsS --max-time 20 "${sth_base}/${old_size}.json" || echo "")"
            if [ -z "${pinned}" ]; then
              echo "::error::${name}: previously-published STH at size ${old_size} is GONE — history dropped."
              return 1
            fi
            pin_root="$(echo "${pinned}" | jq -r '.root_hash')"
            pin_sig="$(echo "${pinned}" | jq -r '.signature')"
            if [ "${pin_root}" != "${old_root}" ] || [ "${pin_sig}" != "${old_sig}" ]; then
              echo "::error::${name}: EQUIVOCATION — STH at size ${old_size} changed since last run."
              return 1
            fi

            cur_size="$(curl -fsS --max-time 20 "${latest_url}" | jq -r '.tree_size')"
            if [ "${cur_size}" -lt "${old_size}" ]; then
              echo "::error::${name}: latest tree_size shrank ${old_size} -> ${cur_size} — append-only violated."
              return 1
            fi
            echo "${name}: consistent — size ${old_size} still pinned, latest ${cur_size}."
            return 0
          }

          rc=0
          check_tree "commit-log" ".sth-prev/commit-latest.json" \
            "${base}/v1/sth" "${base}/v1/sth/latest.json" || rc=1
          # The account tree may be brand-new this publish; only tripwire if a
          # prior STH was cached.
          check_tree "account-key" ".sth-prev/account-latest.json" \
            "${base}/v1/account-keys/sth" "${base}/v1/account-keys/sth/latest.json" || rc=1
          # The binaries tree is likewise only present once a release has been
          # attested; tripwire only if a prior STH was cached.
          check_tree "binaries" ".sth-prev/binaries-latest.json" \
            "${base}/v1/binaries/sth" "${base}/v1/binaries/sth/latest.json" || rc=1
          if [ "${rc}" -ne 0 ]; then
            echo "Equivocation tripwire FAILED."
            exit 1
          fi

          # (3) Refresh the cached latest STHs for the next run's tripwire.
          mkdir -p .sth-prev
          curl -fsS --max-time 20 "${base}/v1/sth/latest.json" -o .sth-prev/commit-latest.json
          curl -fsS --max-time 20 "${base}/v1/account-keys/sth/latest.json" \
            -o .sth-prev/account-latest.json \
            || echo "account latest not yet visible — will seed next run"
          curl -fsS --max-time 20 "${base}/v1/binaries/sth/latest.json" \
            -o .sth-prev/binaries-latest.json \
            || echo "binaries latest not yet visible — will seed next run"

      - name: Save published STHs for next run's tripwire
        if: steps.decide.outputs.build == 'true'
        uses: actions/cache/save@v4
        with:
          path: .sth-prev
          key: transparency-sth-${{ github.run_id }}
