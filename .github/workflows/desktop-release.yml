name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install sops
        run: brew install sops

      - name: Decrypt production secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          sops --decrypt --input-type dotenv --output-type dotenv secrets.prod.enc.env >> $GITHUB_ENV

      - name: Install dependencies
        run: pnpm install

      - name: Build macOS (Universal)
        run: pnpm build:macos

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: pollis-macos
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install sops
        run: choco install sops

      - name: Decrypt production secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        shell: bash
        run: |
          sops --decrypt --input-type dotenv --output-type dotenv secrets.prod.enc.env >> $GITHUB_ENV

      - name: Install dependencies
        run: pnpm install

      - name: Build Windows
        run: pnpm build:windows

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: pollis-windows
          path: src-tauri/target/release/bundle/nsis/*.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install sops
        run: |
          curl -LO https://github.com/getsops/sops/releases/download/v3.9.1/sops-v3.9.1.linux.amd64
          chmod +x sops-v3.9.1.linux.amd64
          sudo mv sops-v3.9.1.linux.amd64 /usr/local/bin/sops

      - name: Decrypt production secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          sops --decrypt --input-type dotenv --output-type dotenv secrets.prod.enc.env >> $GITHUB_ENV

      - name: Install dependencies
        run: pnpm install

      - name: Build Linux
        run: pnpm build:linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: pollis-linux
          path: src-tauri/target/release/bundle/appimage/*.AppImage

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/pollis-macos/*.dmg
            artifacts/pollis-windows/*.exe
            artifacts/pollis-linux/*.AppImage
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
