name: Desktop Release (Tauri)

# Tauri pipeline — the active desktop release path again as of the
# Electron→Tauri re-migration (#386). A tag push (`git tag v1.2.0 &&
# git push --tags`) runs the full ceremony: signed macOS DMG/ZIP, Azure
# Trusted-Signed Windows NSIS, Linux AppImage/.deb/.rpm, R2 upload, GitHub
# release, AUR push, install.sh + latest.json refresh, and the Tauri-format
# `cdn.pollis.com/releases/update-*.json` updater manifests (minisign-signed).
#
# electron-release.yml no longer fires on tags (it kept workflow_dispatch
# only for emergency Electron rebuilds), so a tag triggers this pipeline
# alone — no double db-apply / latest.json / AUR races.
#
# Cutover note: there is no in-place auto-update from an installed Electron
# build to a Tauri build — electron-updater installs electron-builder
# artifacts and Tauri verifies a minisign signature the Electron build
# doesn't carry. Existing Electron installs must re-download once; every
# release after that auto-updates through the Tauri updater normally.
on:
  workflow_dispatch:
  # Tag-driven release: `git tag v1.2.0 && git push --tags` is the entire
  # ceremony. CI extracts the version from the tag and stamps every file
  # before building.
  push:
    tags:
      - "v*"

# Least-privilege default. Jobs that need more declare it themselves:
# `release` has contents: write (GitHub release), `provenance` has
# id-token/attestations. Everything else only reads the repo.
permissions:
  contents: read

jobs:
  # This workflow builds + publishes a FULL versioned release (installers, prod DB
  # migrations, SLSA/cosign provenance, binary-transparency log) — all keyed on the
  # tag name (`github.ref_name`). So it must be triggered by pushing a `v*` tag, not
  # by a bare workflow_dispatch (where the ref is a branch and the version stamp
  # would be a non-semver branch name). This guard fails such a run in seconds with
  # the exact command, instead of a cryptic "not strict semver" error deep in a build.
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Require a version tag
        run: |
          if [ "${{ github.ref_type }}" != "tag" ] || [[ "${{ github.ref_name }}" != v* ]]; then
            echo "::error title=Desktop Release is tag-driven::Push a version tag to release — do not use workflow_dispatch."
            echo "This job publishes a full versioned release keyed on the tag name, so it needs a v* tag." >&2
            echo "To release:  git tag vX.Y.Z <sha> && git push origin vX.Y.Z" >&2
            exit 1
          fi
          echo "Releasing ${{ github.ref_name }}"

  build-macos:
    needs: preflight
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      # Pinned to the EXACT version in rust-toolchain.toml (1.96.0) — not
      # `@stable`, which floats and would let two builds of the same commit
      # compile with different rustc versions and emit different bytes. Bump
      # both in lockstep. (macOS reproducibility is best-effort — see
      # docs/reproducible-builds-residuals.md — but a pinned compiler is a
      # prerequisite for it and for a stable recorded build recipe.)
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Stamp version from git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./scripts/bump-version.sh "$VERSION"

      - name: Load production secrets
        run: |
          echo "TURSO_URL=${{ secrets.TURSO_URL }}" >> $GITHUB_ENV
          # Slice 3 (#419): the shipped client holds a READ-ONLY main-DB token — every
          # write goes through the Delivery Service. The RW token never enters the binary.
          echo "TURSO_TOKEN=${{ secrets.TURSO_RO_TOKEN }}" >> $GITHUB_ENV
          echo "R2_S3_ENDPOINT=${{ secrets.R2_S3_ENDPOINT }}" >> $GITHUB_ENV
          echo "R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "R2_SECRET_KEY=${{ secrets.R2_SECRET_KEY }}" >> $GITHUB_ENV
          echo "R2_PUBLIC_URL=${{ secrets.R2_PUBLIC_URL }}" >> $GITHUB_ENV
          echo "R2_REGION=${{ secrets.R2_REGION }}" >> $GITHUB_ENV
          echo "LIVEKIT_URL=${{ secrets.LIVEKIT_URL }}" >> $GITHUB_ENV
          echo "LIVEKIT_API_KEY=${{ secrets.LIVEKIT_API_KEY }}" >> $GITHUB_ENV
          echo "LIVEKIT_API_SECRET=${{ secrets.LIVEKIT_API_SECRET }}" >> $GITHUB_ENV
          echo "POLLIS_DELIVERY_URL=${{ secrets.POLLIS_DELIVERY_URL }}" >> $GITHUB_ENV
          # Commit-log DB: the client gets the URL + the READ-ONLY token only
          # (option_env! bakes them into the binary). The READ-WRITE admin token
          # (LOG_DB_ADMIN_TOKEN) is NEVER injected into a client build — it is
          # migrations + the Delivery Service only. See docs/goal-a-deploy-runbook.md.
          echo "LOG_DB_URL=${{ secrets.LOG_DB_URL }}" >> $GITHUB_ENV
          echo "LOG_DB_TOKEN=${{ secrets.LOG_DB_TOKEN }}" >> $GITHUB_ENV
          echo "CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" >> $GITHUB_ENV

      # webrtc-audio-processing-sys (vendored): meson + ninja drive the C++
      # build, clang/cmake are already on macOS GitHub runners.
      - name: Install audio-processing build deps
        run: brew install meson ninja

      - name: Install dependencies
        run: pnpm install

      # The macOS screen-capture helper (pollis-capture-macos) owns
      # ScreenCaptureKit in its own process — issue #283 Phase 2 — so an
      # uncatchable ObjC throw from SCK can no longer kill the app.
      # Tauri bundles it as a sidecar (externalBin in
      # tauri.macos.conf.json). `src-tauri/build.rs` builds + stages the
      # binary at the target-triple-suffixed path automatically during
      # tauri-action's cargo build, so no explicit pre-stage step is
      # needed here.

      - name: Build and sign macOS (ARM)
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target aarch64-apple-darwin

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: pollis-macos
          if-no-files-found: error
          path: |
            target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            target/aarch64-apple-darwin/release/bundle/macos/*.tar.gz
            target/aarch64-apple-darwin/release/bundle/macos/*.sig

  build-windows:
    needs: preflight
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      # Pinned to rust-toolchain.toml's 1.96.0 (see the macOS job note) — never
      # float on @stable, or the same commit can produce different bytes.
      - uses: dtolnay/rust-toolchain@1.96.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Stamp version from git tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./scripts/bump-version.sh "$VERSION"

      - name: Load production secrets
        shell: bash
        run: |
          echo "TURSO_URL=${{ secrets.TURSO_URL }}" >> $GITHUB_ENV
          # Slice 3 (#419): the shipped client holds a READ-ONLY main-DB token — every
          # write goes through the Delivery Service. The RW token never enters the binary.
          echo "TURSO_TOKEN=${{ secrets.TURSO_RO_TOKEN }}" >> $GITHUB_ENV
          echo "R2_S3_ENDPOINT=${{ secrets.R2_S3_ENDPOINT }}" >> $GITHUB_ENV
          echo "R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "R2_SECRET_KEY=${{ secrets.R2_SECRET_KEY }}" >> $GITHUB_ENV
          echo "R2_PUBLIC_URL=${{ secrets.R2_PUBLIC_URL }}" >> $GITHUB_ENV
          echo "R2_REGION=${{ secrets.R2_REGION }}" >> $GITHUB_ENV
          echo "LIVEKIT_URL=${{ secrets.LIVEKIT_URL }}" >> $GITHUB_ENV
          echo "LIVEKIT_API_KEY=${{ secrets.LIVEKIT_API_KEY }}" >> $GITHUB_ENV
          echo "LIVEKIT_API_SECRET=${{ secrets.LIVEKIT_API_SECRET }}" >> $GITHUB_ENV
          echo "POLLIS_DELIVERY_URL=${{ secrets.POLLIS_DELIVERY_URL }}" >> $GITHUB_ENV
          # Commit-log DB: the client gets the URL + the READ-ONLY token only
          # (option_env! bakes them into the binary). The READ-WRITE admin token
          # (LOG_DB_ADMIN_TOKEN) is NEVER injected into a client build — it is
          # migrations + the Delivery Service only. See docs/goal-a-deploy-runbook.md.
          echo "LOG_DB_URL=${{ secrets.LOG_DB_URL }}" >> $GITHUB_ENV
          echo "LOG_DB_TOKEN=${{ secrets.LOG_DB_TOKEN }}" >> $GITHUB_ENV
          echo "CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: pnpm install

      - name: Install OpenSSL via vcpkg
        shell: bash
        run: |
          vcpkg install openssl:x64-windows-static-md
          echo "OPENSSL_DIR=$VCPKG_INSTALLATION_ROOT/installed/x64-windows-static-md" >> $GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $GITHUB_ENV

      - name: Install Artifact Signing client + SignTool
        shell: pwsh
        run: |
          $toolsDir = Join-Path $env:RUNNER_TEMP "artifact-signing"
          New-Item -ItemType Directory -Force -Path $toolsDir | Out-Null

          nuget install Microsoft.Windows.SDK.BuildTools -OutputDirectory $toolsDir -ExcludeVersion
          nuget install Microsoft.ArtifactSigning.Client -OutputDirectory $toolsDir -ExcludeVersion

          $signtool = Get-ChildItem -Path $toolsDir -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match '\\x64\\' } |
            Select-Object -First 1
          $dlib = Get-ChildItem -Path $toolsDir -Recurse -Filter Azure.CodeSigning.Dlib.dll |
            Where-Object { $_.FullName -match '\\x64\\' } |
            Select-Object -First 1

          if (-not $signtool) { throw "signtool.exe not found under $toolsDir" }
          if (-not $dlib)     { throw "Azure.CodeSigning.Dlib.dll not found under $toolsDir" }

          "SIGNTOOL_PATH=$($signtool.FullName)"  | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "SIGNING_DLIB_PATH=$($dlib.FullName)"  | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Write Artifact Signing metadata
        shell: pwsh
        env:
          AZURE_SIGNING_ENDPOINT: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          AZURE_SIGNING_ACCOUNT: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          AZURE_CERT_PROFILE: ${{ secrets.AZURE_CERT_PROFILE }}
        run: |
          $metadataPath = Join-Path $env:RUNNER_TEMP "sign-metadata.json"
          [ordered]@{
            Endpoint               = $env:AZURE_SIGNING_ENDPOINT
            CodeSigningAccountName = $env:AZURE_SIGNING_ACCOUNT
            CertificateProfileName = $env:AZURE_CERT_PROFILE
          } | ConvertTo-Json | Out-File -FilePath $metadataPath -Encoding utf8
          "SIGN_METADATA_PATH=$metadataPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Inject Windows signCommand into tauri.conf.json
        shell: bash
        run: |
          # Object form avoids Tauri's naive whitespace-split on the string form,
          # which would otherwise pass literal quotes through to CreateProcessW
          # and trip ERROR_INVALID_NAME (os error 123) on Windows paths.
          jq \
            --arg cmd "$SIGNTOOL_PATH" \
            --arg dlib "$SIGNING_DLIB_PATH" \
            --arg meta "$SIGN_METADATA_PATH" \
            '.bundle.windows = ((.bundle.windows // {}) + {
              signCommand: {
                cmd: $cmd,
                args: ["sign","/v","/fd","SHA256","/tr","http://timestamp.acs.microsoft.com","/td","SHA256","/dlib",$dlib,"/dmdf",$meta,"%1"]
              }
            })' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          echo "signCommand injected:"
          jq '.bundle.windows.signCommand' src-tauri/tauri.conf.json

      - name: Build Windows
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: pnpm build:tauri:windows

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: pollis-windows
          if-no-files-found: error
          path: |
            target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            target/x86_64-pc-windows-msvc/release/bundle/nsis/*.zip
            target/x86_64-pc-windows-msvc/release/bundle/nsis/*.sig

  build-capture-helper:
    needs: preflight
    # The Linux screen-capture helper (pollis-capture-linux) links the
    # `pipewire` 0.9 crate, whose libspa-sys bindgen step generates
    # `spa_video_info_raw` from the build host's *system* PipeWire headers
    # (libpipewire is never bundled — it must match the user's running
    # pipewire daemon at runtime). ubuntu-22.04 ships PipeWire 0.3.48,
    # whose struct lacks `flags` and types `modifier` as i64, so libspa
    # 0.9 fails to compile. ubuntu-24.04 ships PipeWire 1.0.5, which
    # matches what the crate expects. Built in isolation here so the main
    # app job can stay on ubuntu-22.04 for a low AppImage glibc floor
    # (messaging must run on old distros) — only this small helper needs
    # modern PipeWire, which screen share requires at runtime anyway.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # Pinned to rust-toolchain.toml's 1.96.0 (see the macOS job note) — never
      # float on @stable, or the same commit can produce different bytes.
      - uses: dtolnay/rust-toolchain@1.96.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install PipeWire build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpipewire-0.3-dev \
            libxcb1-dev \
            libxcb-shm0-dev \
            libxcb-randr0-dev \
            clang \
            pkg-config

      # Built on this 24.04 runner so libspa-sys's bindgen sees PipeWire
      # 1.0 headers; the app job runs on ubuntu-22.04 (PipeWire 0.3) and
      # would fail to compile the helper there. We hand the finished
      # binary to the app job via an artifact; the app job's build.rs
      # detects the pre-staged file and skips rebuilding.
      - name: Build and stage screen-capture helper
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu -p pollis-capture-linux
          mkdir -p src-tauri/binaries
          cp target/x86_64-unknown-linux-gnu/release/pollis-capture-linux \
             src-tauri/binaries/pollis-capture-linux-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/pollis-capture-linux-x86_64-unknown-linux-gnu

      - name: Upload screen-capture helper
        uses: actions/upload-artifact@v4
        with:
          name: pollis-capture-linux
          if-no-files-found: error
          path: src-tauri/binaries/pollis-capture-linux-x86_64-unknown-linux-gnu

  build-linux:
    needs: build-capture-helper
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      # Pinned to rust-toolchain.toml's 1.96.0 (see the macOS job note) — never
      # float on @stable, or the same commit can produce different bytes.
      - uses: dtolnay/rust-toolchain@1.96.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Stamp version from git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./scripts/bump-version.sh "$VERSION"

      # libva-dev: header-only build dep for webrtc-sys's VAAPI H.264
      # encoder wrapper. `libva.so.2` / `libva-drm.so.2` are dlopened at
      # runtime via lazy-load shims — the binary doesn't link them — so
      # missing libva at the user's machine just makes the VAAPI factory
      # report unsupported and falls back to OpenH264 software. With
      # libva headers present at build time we get the VAAPI factory
      # compiled in; Intel/AMD iGPU users then get HW H.264. See #293.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            libasound2-dev \
            libpulse-dev \
            libpipewire-0.3-dev \
            libva-dev \
            libdbus-1-dev \
            rpm \
            cmake \
            clang \
            ninja-build

      # Ubuntu 22.04 ships meson 0.61, but webrtc-audio-processing-sys passes
      # `--reconfigure` to meson on its first run, which requires meson >= 1.1.
      # Install a current meson via pip instead of apt.
      - name: Install meson (newer than apt)
        run: |
          python3 -m pip install --user 'meson>=1.3'
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Load production secrets
        run: |
          echo "TURSO_URL=${{ secrets.TURSO_URL }}" >> $GITHUB_ENV
          # Slice 3 (#419): the shipped client holds a READ-ONLY main-DB token — every
          # write goes through the Delivery Service. The RW token never enters the binary.
          echo "TURSO_TOKEN=${{ secrets.TURSO_RO_TOKEN }}" >> $GITHUB_ENV
          echo "R2_S3_ENDPOINT=${{ secrets.R2_S3_ENDPOINT }}" >> $GITHUB_ENV
          echo "R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "R2_SECRET_KEY=${{ secrets.R2_SECRET_KEY }}" >> $GITHUB_ENV
          echo "R2_PUBLIC_URL=${{ secrets.R2_PUBLIC_URL }}" >> $GITHUB_ENV
          echo "R2_REGION=${{ secrets.R2_REGION }}" >> $GITHUB_ENV
          echo "LIVEKIT_URL=${{ secrets.LIVEKIT_URL }}" >> $GITHUB_ENV
          echo "LIVEKIT_API_KEY=${{ secrets.LIVEKIT_API_KEY }}" >> $GITHUB_ENV
          echo "LIVEKIT_API_SECRET=${{ secrets.LIVEKIT_API_SECRET }}" >> $GITHUB_ENV
          echo "POLLIS_DELIVERY_URL=${{ secrets.POLLIS_DELIVERY_URL }}" >> $GITHUB_ENV
          # Commit-log DB: the client gets the URL + the READ-ONLY token only
          # (option_env! bakes them into the binary). The READ-WRITE admin token
          # (LOG_DB_ADMIN_TOKEN) is NEVER injected into a client build — it is
          # migrations + the Delivery Service only. See docs/goal-a-deploy-runbook.md.
          echo "LOG_DB_URL=${{ secrets.LOG_DB_URL }}" >> $GITHUB_ENV
          echo "LOG_DB_TOKEN=${{ secrets.LOG_DB_TOKEN }}" >> $GITHUB_ENV
          echo "CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" >> $GITHUB_ENV

      # --frozen-lockfile: fail (don't silently re-resolve) if pnpm-lock.yaml
      # drifted — the Linux payload is the reproducible unit, so its JS inputs
      # must be pinned, not floated (docs/verifiable-builds-design.md §1.2/§1.4).
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The screen-capture helper is a separate workspace binary that Tauri
      # bundles as a sidecar (externalBin in tauri.linux.conf.json). It is
      # compiled in the build-capture-helper job on ubuntu-24.04 (modern
      # PipeWire headers) and pulled in here as an artifact, staged at the
      # target-triple-suffixed externalBin path BEFORE `tauri build` — or
      # the Linux release ships without it and screen sharing fails at
      # runtime.
      - name: Download screen-capture helper
        uses: actions/download-artifact@v4
        with:
          name: pollis-capture-linux
          path: src-tauri/binaries

      - name: Mark screen-capture helper executable
        run: chmod +x src-tauri/binaries/pollis-capture-linux-x86_64-unknown-linux-gnu

      # Determinism inputs for the reproducible Linux payload (P5, #484):
      #   * SOURCE_DATE_EPOCH — the tag commit's unix seconds. Deterministic and
      #     independently recoverable from `git` by any rebuilder (NOT `now`), so
      #     anything that would otherwise embed wall-clock time (archive mtimes,
      #     resource stamps) resolves to a stable value. This is the SAME epoch
      #     the attest leaf and the rebuild-verify workflow derive.
      #   * RUSTFLAGS --remap-path-prefix — strips absolute build paths (home,
      #     cargo home, workspace root) out of the binary's debug info / panic
      #     strings so two different hosts building this commit emit the same
      #     bytes. Linux has NO per-target rustflags in .cargo/config.toml
      #     (only macOS/Windows do), so exporting RUSTFLAGS here is purely
      #     additive — it does not clobber any configured flags. Order matters:
      #     the most general prefix ($HOME) is listed first and the more specific
      #     ones after it, because rustc applies the LAST matching remap.
      - name: Configure reproducible build flags (Linux payload)
        run: |
          set -euo pipefail
          echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"
          CARGO_HOME_DIR="${CARGO_HOME:-$HOME/.cargo}"
          echo "RUSTFLAGS=--remap-path-prefix=${HOME}=/pollis-home --remap-path-prefix=${CARGO_HOME_DIR}=/pollis-cargo --remap-path-prefix=${GITHUB_WORKSPACE}=/pollis-src" >> "$GITHUB_ENV"

      # `-- --locked` forwards to the underlying `cargo build`: a drifted
      # Cargo.lock FAILS the build instead of silently resolving new crate
      # versions (the transparency build already builds --locked; the desktop
      # build must too — §1.2). SOURCE_DATE_EPOCH + RUSTFLAGS come from the step
      # above via $GITHUB_ENV.
      - name: Build Linux
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target x86_64-unknown-linux-gnu -- --locked

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: pollis-linux
          if-no-files-found: error
          path: |
            target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.tar.gz
            target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.sig
            target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm

  apply-migrations:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply pending DB migrations to production (main DB)
        env:
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_TOKEN: ${{ secrets.TURSO_ADMIN_TOKEN }}
        run: ./scripts/db-apply.sh

      # Second apply, against the SEPARATE commit-log DB (issue #420, Goal A).
      # Runs only if the main-DB apply above succeeded (steps are sequential and
      # fail-fast). Uses the READ-WRITE admin token — migrations need writes.
      #
      # HAZARD — db-apply.sh applies EVERY *.sql in MIGRATIONS_DIR that the
      # target DB hasn't recorded yet, then records each into that DB's own
      # schema_migrations. The default dir (pollis-core/src/db/migrations) holds
      # the whole MAIN schema (000000_baseline + 000001..000007). Pointing the
      # *empty* log DB at that default dir would apply the ENTIRE main schema to
      # the log DB — baseline would create users/groups/channels AND an
      # FK-bearing mls_commit_log, after which 000007's `CREATE TABLE IF NOT
      # EXISTS` is a no-op, so the log DB would end up with the FK-bearing tables
      # the split is meant to avoid. Conversely, the main-DB apply above ALSO
      # sees 000007 (it's in the default dir): the CREATE TABLE IF NOT EXISTS is
      # a harmless no-op on main, but it still records v7 in main's
      # schema_migrations — misleading, since 000007 is a log-DB-only schema.
      #
      # FIX (owned by the migrations stream, S2 — not changed here): MOVE
      # 000007_commit_log_db.sql out of the shared dir into a dedicated log-DB
      # migrations dir, renumbered as its own fresh sequence
      # (e.g. pollis-core/src/db/migrations-log/000001_commit_log_db.sql). That
      # keeps the main schema out of the log DB AND keeps the log schema out of
      # the main DB's pending set. This step points MIGRATIONS_DIR at that
      # dedicated dir; until S2 creates it the step safely no-ops
      # ("No pending migrations"). See docs/goal-a-deploy-runbook.md §"000007 hazard".
      - name: Apply pending DB migrations to production (commit-log DB)
        env:
          TURSO_URL: ${{ secrets.LOG_DB_URL }}
          TURSO_TOKEN: ${{ secrets.LOG_DB_ADMIN_TOKEN }}
          MIGRATIONS_DIR: pollis-core/src/db/migrations-log
        run: ./scripts/db-apply.sh

  release:
    needs: [build-macos, build-windows, build-linux, apply-migrations]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Load production secrets
        run: |
          echo "R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "R2_SECRET_KEY=${{ secrets.R2_SECRET_KEY }}" >> $GITHUB_ENV
          echo "CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Debug artifact structure
        run: |
          echo "Listing artifact structure:"
          find artifacts -type f

      - name: Upload install script to R2
        run: |
          ENDPOINT="https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws s3 cp website/install.sh "s3://pollis/releases/install.sh" \
            --endpoint-url "${ENDPOINT}" \
            --content-type "text/plain" \
            --cache-control "no-cache"
        env:
          AWS_ACCESS_KEY_ID: ${{ env.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.R2_SECRET_KEY }}
          AWS_DEFAULT_REGION: auto

      - name: Upload installers to R2
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ENDPOINT="https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"
          DMG=$(find artifacts/pollis-macos -name "*.dmg" | head -1)
          EXE=$(find artifacts/pollis-windows -name "*.exe" | head -1)
          APPIMAGE=$(find artifacts/pollis-linux -name "*.AppImage" | head -1)
          DEB=$(find artifacts/pollis-linux -name "*.deb" | head -1)
          RPM=$(find artifacts/pollis-linux -name "*.rpm" | head -1)
          # Version-pinned, immutable copies — the canonical per-release artifacts.
          aws s3 cp "$DMG"      "s3://pollis/releases/${VERSION}/pollis-${VERSION}-macos.dmg"      --endpoint-url "${ENDPOINT}"
          aws s3 cp "$EXE"      "s3://pollis/releases/${VERSION}/pollis-${VERSION}-windows.exe"    --endpoint-url "${ENDPOINT}"
          aws s3 cp "$APPIMAGE" "s3://pollis/releases/${VERSION}/pollis-${VERSION}-linux.AppImage" --endpoint-url "${ENDPOINT}"
          aws s3 cp "$DEB"      "s3://pollis/releases/${VERSION}/pollis-${VERSION}-linux.deb"       --endpoint-url "${ENDPOINT}"
          aws s3 cp "$RPM"      "s3://pollis/releases/${VERSION}/pollis-${VERSION}-linux.rpm"       --endpoint-url "${ENDPOINT}"
          # Stable "latest" aliases (overwritten every release, NEVER pruned) so the
          # website's no-JS download links resolve to the current release forever,
          # instead of a hard-coded version that the retention prune below would 404.
          aws s3 cp "$DMG"      "s3://pollis/releases/latest/pollis-latest-macos.dmg"      --endpoint-url "${ENDPOINT}" --cache-control "no-cache"
          aws s3 cp "$EXE"      "s3://pollis/releases/latest/pollis-latest-windows.exe"    --endpoint-url "${ENDPOINT}" --cache-control "no-cache"
          aws s3 cp "$APPIMAGE" "s3://pollis/releases/latest/pollis-latest-linux.AppImage" --endpoint-url "${ENDPOINT}" --cache-control "no-cache"
          aws s3 cp "$DEB"      "s3://pollis/releases/latest/pollis-latest-linux.deb"       --endpoint-url "${ENDPOINT}" --cache-control "no-cache"
          aws s3 cp "$RPM"      "s3://pollis/releases/latest/pollis-latest-linux.rpm"       --endpoint-url "${ENDPOINT}" --cache-control "no-cache"
        env:
          AWS_ACCESS_KEY_ID: ${{ env.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.R2_SECRET_KEY }}
          AWS_DEFAULT_REGION: auto

      - name: Upload updater bundles to R2
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ENDPOINT="https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"
          # macOS updater bundle (.tar.gz + .sig)
          find artifacts/pollis-macos -name "*.tar.gz" -exec bash -c 'aws s3 cp "$0" "s3://pollis/releases/'"${VERSION}"'/$(basename "$0")" --endpoint-url "'"${ENDPOINT}"'"' {} \;
          find artifacts/pollis-macos -name "*.sig" -exec bash -c 'aws s3 cp "$0" "s3://pollis/releases/'"${VERSION}"'/$(basename "$0")" --endpoint-url "'"${ENDPOINT}"'"' {} \;
          # Windows updater bundle (.exe + .sig) — Tauri v2 uses the exe directly
          find artifacts/pollis-windows -name "*.exe" -exec bash -c 'aws s3 cp "$0" "s3://pollis/releases/'"${VERSION}"'/$(basename "$0")" --endpoint-url "'"${ENDPOINT}"'"' {} \;
          find artifacts/pollis-windows -name "*.sig" -exec bash -c 'aws s3 cp "$0" "s3://pollis/releases/'"${VERSION}"'/$(basename "$0")" --endpoint-url "'"${ENDPOINT}"'"' {} \;
          # Linux updater bundle (.AppImage + .sig) — Tauri v2 uses the AppImage directly
          find artifacts/pollis-linux -name "*.AppImage" -exec bash -c 'aws s3 cp "$0" "s3://pollis/releases/'"${VERSION}"'/$(basename "$0")" --endpoint-url "'"${ENDPOINT}"'"' {} \;
          find artifacts/pollis-linux -name "*.sig" -exec bash -c 'aws s3 cp "$0" "s3://pollis/releases/'"${VERSION}"'/$(basename "$0")" --endpoint-url "'"${ENDPOINT}"'"' {} \;
        env:
          AWS_ACCESS_KEY_ID: ${{ env.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.R2_SECRET_KEY }}
          AWS_DEFAULT_REGION: auto

      # Tauri's updater resolves the configured endpoint URL with the
      # current binary's bundle_type before fetching, so each bundle type
      # gets its own manifest (URL + signature must match the bytes the
      # client will actually try to install). The legacy `update.json` is
      # kept as a fallback for clients shipped before the templated
      # endpoint was added (it points to the AppImage).
      - name: Publish per-bundle update manifests to R2
        run: |
          VERSION="${GITHUB_REF_NAME}"
          VERSION_NUM="${VERSION#v}"
          ENDPOINT="https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"
          CDN="https://cdn.pollis.com/releases/${VERSION}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Read signatures from artifact files
          MAC_SIG=$(find artifacts/pollis-macos -name "*.tar.gz.sig" -exec cat {} \; | head -1)
          WIN_SIG=$(find artifacts/pollis-windows -name "*.exe.sig" -exec cat {} \; | head -1)
          LINUX_SIG=$(find artifacts/pollis-linux -name "*.AppImage.sig" -exec cat {} \; | head -1)

          # Find the actual filenames for the updater bundles
          MAC_TAR=$(find artifacts/pollis-macos -name "*.tar.gz" -exec basename {} \; | head -1)
          WIN_EXE=$(find artifacts/pollis-windows -name "*.exe" -exec basename {} \; | head -1)
          LINUX_APPIMAGE=$(find artifacts/pollis-linux -name "*.AppImage" -exec basename {} \; | head -1)

          # Helper: emit a single-platform manifest. Tauri only reads the
          # platform key matching the client's target/arch; the others are
          # ignored, but we keep them so the file can also be read by
          # tooling that's looking for cross-platform info.
          emit_manifest() {
            local out="$1"
            jq -n \
              --arg version "$VERSION_NUM" \
              --arg pub_date "$PUB_DATE" \
              --arg mac_url "${CDN}/${MAC_TAR}" \
              --arg mac_sig "$MAC_SIG" \
              --arg win_url "${CDN}/${WIN_EXE}" \
              --arg win_sig "$WIN_SIG" \
              --arg linux_url "${CDN}/${LINUX_APPIMAGE}" \
              --arg linux_sig "$LINUX_SIG" \
              '{
                version: $version,
                pub_date: $pub_date,
                platforms: {
                  "darwin-aarch64": { url: $mac_url, signature: $mac_sig },
                  "windows-x86_64": { url: $win_url, signature: $win_sig },
                  "linux-x86_64": { url: $linux_url, signature: $linux_sig }
                }
              }' > "$out"
          }

          # Per-bundle manifests. Today the Linux entry in every Linux
          # variant points to the AppImage — we don't yet sign .deb/.rpm
          # bundles, so deb/rpm clients get the same payload (which fails
          # in the updater for non-AppImage bundles, but that's caught
          # client-side by the install-kind guard for known package
          # managers like AUR). Once we sign deb/rpm we can swap their
          # URLs to the right artifact here.
          emit_manifest update-appimage.json
          emit_manifest update-deb.json
          emit_manifest update-rpm.json
          emit_manifest update-app.json
          emit_manifest update-nsis.json
          # Legacy single-manifest endpoint, still hit by clients shipped
          # before the templated `update-{{bundle_type}}.json` endpoint.
          emit_manifest update.json

          for f in update-appimage.json update-deb.json update-rpm.json update-app.json update-nsis.json update.json; do
            aws s3 cp "$f" "s3://pollis/releases/$f" \
              --endpoint-url "${ENDPOINT}" \
              --content-type "application/json" \
              --cache-control "no-cache"
          done
        env:
          AWS_ACCESS_KEY_ID: ${{ env.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.R2_SECRET_KEY }}
          AWS_DEFAULT_REGION: auto

      - name: Publish latest.json to R2
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ENDPOINT="https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"
          echo "{\"version\":\"${VERSION}\",\"macos\":\"https://cdn.pollis.com/releases/${VERSION}/pollis-${VERSION}-macos.dmg\",\"windows\":\"https://cdn.pollis.com/releases/${VERSION}/pollis-${VERSION}-windows.exe\",\"linux\":\"https://cdn.pollis.com/releases/${VERSION}/pollis-${VERSION}-linux.AppImage\",\"linux_deb\":\"https://cdn.pollis.com/releases/${VERSION}/pollis-${VERSION}-linux.deb\",\"linux_rpm\":\"https://cdn.pollis.com/releases/${VERSION}/pollis-${VERSION}-linux.rpm\"}" > latest.json
          aws s3 cp latest.json "s3://pollis/releases/latest.json" --endpoint-url "${ENDPOINT}" --content-type "application/json" --cache-control "no-cache"
        env:
          AWS_ACCESS_KEY_ID: ${{ env.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.R2_SECRET_KEY }}
          AWS_DEFAULT_REGION: auto

      # Retention: keep only the newest KEEP version directories under
      # `releases/`. This is COUNT-based and runs only when a release ships — a
      # deliberate choice over an R2 lifecycle (age) rule, which would delete the
      # CURRENT release if the project went a while between releases. GitHub
      # Releases remain the permanent archive of every version's installers; R2
      # keeps a small rolling window because the auto-updater / install.sh / AUR /
      # website only ever reference the latest (plus a couple for rollback
      # headroom). Best-effort: a prune failure must never fail an otherwise-good
      # release, so errors are warnings, not fatal. Only `releases/v<semver>/`
      # prefixes are candidates — top-level files (install.sh, latest.json,
      # update-*.json), the `latest/` alias, and `cli/` never match.
      - name: Prune old release versions from R2 (keep latest 3)
        continue-on-error: true
        run: |
          set -uo pipefail
          ENDPOINT="https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"
          KEEP=3
          CURRENT="${GITHUB_REF_NAME}"

          # Version "directories" directly under releases/. `aws s3 ls` prints
          # `  PRE v1.5.1/` for each common prefix; keep only version-tag-shaped
          # ones (v + digit) so nothing else is ever a deletion candidate.
          VERSIONS=()
          while IFS= read -r v; do
            [ -n "$v" ] && VERSIONS+=("$v")
          done < <(
            aws s3 ls "s3://pollis/releases/" --endpoint-url "${ENDPOINT}" \
              | awk '/ PRE v[0-9]/ { print $2 }' \
              | sed 's#/$##' \
              | sort -Vr
          )

          echo "Found ${#VERSIONS[@]} version prefix(es): ${VERSIONS[*]:-<none>}"
          if [ "${#VERSIONS[@]}" -le "$KEEP" ]; then
            echo "At or below keep threshold ($KEEP) — nothing to prune."
            exit 0
          fi

          # Keep the newest $KEEP, and ALWAYS keep the version we just published
          # (latest.json / update-*.json point at it; also guards any version-sort
          # edge case around prerelease tags).
          KEEP_SET=$(printf '%s\n' "${VERSIONS[@]:0:$KEEP}" "$CURRENT" | sort -u)
          echo "Keeping:"; echo "$KEEP_SET" | sed 's/^/  /'

          for v in "${VERSIONS[@]}"; do
            if ! grep -qxF "$v" <<< "$KEEP_SET"; then
              echo "Pruning s3://pollis/releases/$v/"
              aws s3 rm "s3://pollis/releases/$v/" --recursive --endpoint-url "${ENDPOINT}" \
                || echo "::warning::failed to prune $v — leaving it in place"
            fi
          done
        env:
          AWS_ACCESS_KEY_ID: ${{ env.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.R2_SECRET_KEY }}
          AWS_DEFAULT_REGION: auto

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/pollis-macos/**/*.dmg
            artifacts/pollis-windows/**/*.exe
            artifacts/pollis-linux/**/*.AppImage
            artifacts/pollis-linux/**/*.deb
            artifacts/pollis-linux/**/*.rpm
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      # Publish stable releases to the AUR (skip prereleases like v1.0.43-beta.1)
      - name: Publish to AUR
        if: "!contains(github.ref_name, '-')"
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"

          # Compute sha256 of the .deb artifact built earlier
          DEB_PATH=$(find artifacts/pollis-linux -name "*.deb" | head -1)
          SHA256=$(sha256sum "$DEB_PATH" | awk '{print $1}')

          # Configure SSH for AUR access
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config <<'SSHEOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          SSHEOF

          # Clone the AUR repo
          git clone ssh://aur@aur.archlinux.org/pollis.git aur-pollis
          cd aur-pollis

          # Regenerate the PKGBUILD from scratch (heredoc) rather than
          # sed-patching it. electron-release.yml overwrites this same AUR
          # file with an Electron-layout PKGBUILD (binary at /opt/Pollis,
          # Electron deps), so a sed-only bump would inherit Electron's
          # package()/depends on top of a Tauri .deb — the old behaviour
          # produced a dangling /usr/bin/pollis symlink that failed to
          # launch. Owning the whole file keeps it correct no matter which
          # pipeline ran last. Depends mirror tauri.conf.json's deb.depends
          # plus webkit, in Arch package names.
          cat > PKGBUILD <<PKGBUILD_EOF
          # Maintainer: Pollis <hello@pollis.com>
          # Generated by .github/workflows/desktop-release.yml — do not edit
          # by hand; the workflow overwrites this file on every release.

          pkgname=pollis
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc="End-to-end encrypted messaging"
          arch=('x86_64')
          url="https://pollis.com"
          license=('LicenseRef-proprietary')
          depends=(
            'webkit2gtk-4.1'
            'gtk3'
            'libayatana-appindicator'
            'alsa-lib'
            'libpulse'
            'dbus'
          )
          source=("https://cdn.pollis.com/releases/v\${pkgver}/pollis-v\${pkgver}-linux.deb")
          sha256sums=('${SHA256}')

          package() {
            # The Tauri .deb already lays the app out under /usr (binary at
            # /usr/bin/pollis, capture helper at /usr/bin/pollis-capture-linux,
            # .desktop + icons under /usr/share) — extract it verbatim. No
            # /opt symlink: that is the Electron layout and would clobber the
            # real /usr/bin/pollis with a dangling link.
            bsdtar -xf data.tar.* -C "\${pkgdir}/"
          }
          PKGBUILD_EOF

          # Regenerate .SRCINFO from the updated PKGBUILD
          # Copy PKGBUILD to a nobody-owned temp dir to avoid permission issues with makepkg and .git
          docker run --rm -v "$PWD:/pkg" archlinux:base-devel bash -c \
            "cp /pkg/PKGBUILD /tmp/ && chown -R nobody:nobody /tmp/PKGBUILD && cd /tmp && sudo -u nobody makepkg --printsrcinfo > /pkg/.SRCINFO"

          # Commit and push if there are changes
          git config user.name "Pollis Bot"
          git config user.email "hello@pollis.com"
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "No AUR changes to commit"
          else
            git commit -m "Update to v${VERSION}"
            git push
          fi

  # Keyless build provenance (issue #484, Phase 3). A SECOND, independent
  # transparency anchor — sigstore Fulcio/Rekor — that Pollis does NOT control,
  # cryptographically bound to the GitHub Actions OIDC identity of THIS workflow,
  # as defense in depth against a compromised or compelled Pollis signing key.
  # For every released installer + updater bundle it publishes, NEXT TO the
  # artifact on cdn.pollis.com:
  #   * a SLSA v1 in-toto build-provenance attestation (.intoto.jsonl) at the
  #     EXACT path scripts/attest-binaries.sh records in each BinaryRecord leaf's
  #     `provenance_uri` (${PROVENANCE_BASE}/${artifact_name}.intoto.jsonl), and
  #   * a cosign keyless signature (.sig) + signing certificate (.pem),
  # so `cosign verify-blob` / a SLSA verifier confirm the bytes were built by the
  # Pollis GitHub Actions identity and recorded in the PUBLIC Rekor log, with NO
  # Pollis-held key on the verification path.
  #
  # This is an ADDITIONAL, OPTIONAL layer: it NEVER gates install or auto-update.
  # The minisign updater flow (update-*.json + .sig, Tauri updater) and OS
  # code-signing are untouched — provenance only adds a non-Pollis anchor. Like
  # `attest-and-log` it `needs: [release]`, so the installers, updater manifests,
  # latest.json and GitHub release are already out by the time it runs; a failure
  # here therefore CANNOT corrupt a shipped release — provenance just lags a
  # release until the next successful run.
  provenance:
    needs: [release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      # Minimum scopes for keyless attestation: an OIDC token for Fulcio
      # (id-token), permission to write the attestation to the GH attestations
      # store (attestations), and repo read for checkout (contents). Deliberately
      # NOT contents: write — this job never creates a release or pushes; the
      # `release` job (which does) keeps its own contents: write.
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Load production secrets
        run: |
          echo "R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "R2_SECRET_KEY=${{ secrets.R2_SECRET_KEY }}" >> $GITHUB_ENV
          echo "CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" >> $GITHUB_ENV

      # Same all-artifacts download the release / attest jobs use — the built +
      # signed installers and updater bundles under artifacts/pollis-{macos,
      # windows,linux}/. Provenance runs over the SHIPPED bytes.
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Stage each shipped file under the EXACT canonical name the release job
      # uploads to R2 and scripts/attest-binaries.sh records — so the provenance
      # subject digest is bound to the name auditors resolve, and the published
      # .intoto.jsonl path equals each leaf's `provenance_uri` character-for-
      # character. The macOS updater bundle (.tar.gz) keeps its real basename
      # (the updater manifest references it by that name).
      - name: Stage artifacts under canonical names
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p prov
          cp "$(find artifacts/pollis-macos   -name '*.dmg'      | head -1)" "prov/pollis-${VERSION}-macos.dmg"
          cp "$(find artifacts/pollis-windows -name '*.exe'      | head -1)" "prov/pollis-${VERSION}-windows.exe"
          cp "$(find artifacts/pollis-linux   -name '*.AppImage' | head -1)" "prov/pollis-${VERSION}-linux.AppImage"
          cp "$(find artifacts/pollis-linux   -name '*.deb'      | head -1)" "prov/pollis-${VERSION}-linux.deb"
          cp "$(find artifacts/pollis-linux   -name '*.rpm'      | head -1)" "prov/pollis-${VERSION}-linux.rpm"
          # macOS updater bundle — provenance + cosign cover it under its own name.
          MAC_TAR="$(find artifacts/pollis-macos -name '*.tar.gz' | head -1 || true)"
          if [ -n "${MAC_TAR:-}" ]; then
            cp "$MAC_TAR" "prov/$(basename "$MAC_TAR")"
          fi
          echo "staged provenance subjects:"
          ls -1 prov

      # SLSA v1 in-toto build provenance for every staged artifact, signed
      # keylessly via Fulcio (OIDC identity == this workflow) and recorded in the
      # public Rekor log. A single release-wide attestation carries each artifact
      # as a subject; it is published below at each artifact's recorded
      # provenance_uri and verifies that specific artifact by its digest.
      - name: Generate SLSA build provenance (keyless, Fulcio/Rekor)
        id: attest
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: prov/*

      # Pinned installer action — never an unpinned curl. Puts the `cosign` CLI
      # on the runner for the sign-blob pass below.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # cosign sign-blob each staged artifact keylessly (Fulcio/Rekor, ambient
      # GitHub Actions OIDC — no Pollis key). Emits a detached .sig + the signing
      # .pem certificate per artifact, published next to the artifact so `cosign
      # verify-blob` confirms the bytes against Rekor with no Pollis key on the
      # verification path. The `prov/*` glob expands once, so the .sig/.pem this
      # loop writes are not themselves re-signed.
      - name: cosign sign-blob each artifact
        run: |
          set -euo pipefail
          for f in prov/*; do
            base="$(basename "$f")"
            cosign sign-blob --yes \
              --output-signature "prov/${base}.sig" \
              --output-certificate "prov/${base}.pem" \
              "$f"
          done

      # Publish the attestation + cosign sig/cert NEXT TO each artifact on R2
      # (cdn.pollis.com/releases/<tag>/...). The .intoto.jsonl object key is
      # EXACTLY ${PROVENANCE_BASE}/${artifact_name}.intoto.jsonl — the same string
      # scripts/attest-binaries.sh stamps into each BinaryRecord leaf, so a leaf's
      # provenance_uri resolves. PROVENANCE_BASE defaults to
      # cdn.pollis.com/releases/${RELEASE_TAG}; RELEASE_TAG == github.ref_name ==
      # this VERSION, so producer and consumer agree character-for-character.
      - name: Publish provenance + cosign signatures to R2
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          ENDPOINT="https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"
          BUNDLE="${{ steps.attest.outputs.bundle-path }}"
          for f in prov/*; do
            base="$(basename "$f")"
            # Skip the cosign outputs; only iterate the artifacts themselves.
            case "$base" in
              *.sig|*.pem|*.intoto.jsonl) continue ;;
            esac
            # SLSA build-provenance attestation for this artifact.
            aws s3 cp "$BUNDLE" "s3://pollis/releases/${VERSION}/${base}.intoto.jsonl" \
              --endpoint-url "${ENDPOINT}" --content-type "application/json"
            # cosign detached signature + signing certificate.
            aws s3 cp "prov/${base}.sig" "s3://pollis/releases/${VERSION}/${base}.sig" \
              --endpoint-url "${ENDPOINT}" --content-type "text/plain"
            aws s3 cp "prov/${base}.pem" "s3://pollis/releases/${VERSION}/${base}.pem" \
              --endpoint-url "${ENDPOINT}" --content-type "application/x-pem-file"
          done
        env:
          AWS_ACCESS_KEY_ID: ${{ env.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.R2_SECRET_KEY }}
          AWS_DEFAULT_REGION: auto

  # Binary transparency (issue #453, Phase 2). Compute payload+artifact hashes
  # for every shipped installer (scripts/attest-binaries.sh) and MERGE the
  # per-tag BinaryRecord leaves into the accumulating records JSON on R2, which
  # transparency-publish.yml (daily cron / "rebuild now" dispatch) consumes to
  # build and publish the /v1/binaries tree.
  #
  # Ordering & failure isolation: this `needs: [release]`, so by the time it
  # runs the installers, updater manifests, latest.json and GitHub release are
  # already out. A failure here therefore CANNOT corrupt a shipped release — it
  # only means the binaries tree lags one release until the next successful run.
  # It is logged loudly, never silently swallowed, and the release stands.
  attest-and-log:
    needs: [release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      # The tag commit is HEAD after checkout; its unix timestamp is the
      # deterministic SOURCE_DATE_EPOCH the attest script stamps into each leaf
      # and uses for the reproducible payload-tree hash (not `now`).
      - name: Resolve tag commit timestamp
        id: srcdate
        run: echo "epoch=$(git log -1 --format=%ct)" >> "$GITHUB_OUTPUT"

      # Same all-artifacts download the release job uses — pollis-macos/,
      # pollis-windows/, pollis-linux/ under artifacts/; the script finds each
      # installer recursively.
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # 7z reads the HFS payload inside the .dmg and the NSIS installer's file
      # tree on this Linux runner; jq builds and merges the records JSON.
      - name: Install extraction tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full jq

      - name: Compute BinaryRecord leaves for this tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          SOURCE_DATE_EPOCH: ${{ steps.srcdate.outputs.epoch }}
          ARTIFACTS_DIR: artifacts
          OUT: tag-records.json
        run: |
          set -euo pipefail
          ./scripts/attest-binaries.sh
          echo "per-tag BinaryRecord leaves:"
          jq '.' tag-records.json

      # Merge into the accumulating records JSON transparency-publish.yml reads.
      # Producer (here) and consumer (transparency-publish.yml) reference the
      # SAME object: s3://${R2_TRANSPARENCY_BUCKET}/internal/binary-records.json
      # at ${R2_TRANSPARENCY_ENDPOINT}. Creds are the release workflow's
      # account-wide R2_* keys — per transparency-publish.yml's header note the
      # bare R2_* names are account-wide and owned by the release workflows, so
      # they can write the transparency bucket's internal/ prefix (the
      # namespaced R2_TRANSPARENCY_* creds are the daily publisher's).
      - name: Merge per-tag records into the R2 accumulator
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          # The accumulator lives in the TRANSPARENCY bucket (R2_TRANSPARENCY_*
          # endpoint/bucket below), so it must be written with the transparency
          # bucket's own credentials — the release-bucket R2_ACCESS_KEY_ID keys
          # get AccessDenied here. These are the same creds transparency-publish.yml
          # uses to write this bucket.
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_TRANSPARENCY_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_TRANSPARENCY_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          # Cloudflare R2 rejects the integrity checksums newer aws-cli v2 adds
          # by default; only send/verify them when the operation requires it.
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
          R2_ENDPOINT: ${{ secrets.R2_TRANSPARENCY_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_TRANSPARENCY_BUCKET }}
        run: |
          set -euo pipefail
          KEY="internal/binary-records.json"

          # Pull the current accumulator; a missing object (first-ever attest)
          # starts from an empty array.
          if aws s3 cp "s3://${R2_BUCKET}/${KEY}" ./accumulator.json \
               --endpoint-url "${R2_ENDPOINT}" 2>/dev/null; then
            [ -s ./accumulator.json ] || echo "[]" > ./accumulator.json
          else
            echo "no existing accumulator at ${KEY} — starting from []"
            echo "[]" > ./accumulator.json
          fi

          # Idempotent on re-run: if this tag's leaves are already accumulated,
          # do nothing (re-appending would double the tag's leaves in the tree).
          existing="$(jq --arg t "$RELEASE_TAG" \
            'map(select(.release_tag == $t)) | length' ./accumulator.json)"
          if [ "${existing}" -gt 0 ]; then
            echo "${RELEASE_TAG} already present in accumulator (${existing} leaves) — nothing to merge."
            exit 0
          fi

          # Append this tag's leaves in publish order (existing first, new last).
          jq -s 'add' ./accumulator.json tag-records.json > ./merged.json
          echo "accumulator: $(jq 'length' ./accumulator.json) + $(jq 'length' tag-records.json) = $(jq 'length' ./merged.json) records"

          # Write back to the EXACT key the consumer reads. no-cache: it is a
          # build input for the publisher, never a served/immutable artifact.
          aws s3 cp ./merged.json "s3://${R2_BUCKET}/${KEY}" \
            --endpoint-url "${R2_ENDPOINT}" \
            --content-type "application/json" \
            --cache-control "no-cache"
          echo "merged records uploaded to s3://${R2_BUCKET}/${KEY}"
