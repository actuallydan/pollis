name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install sops
        run: brew install sops

      - name: Decrypt production secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          echo "$SOPS_AGE_KEY" > /tmp/sops-age-key.txt
          unset SOPS_AGE_KEY
          SOPS_AGE_KEY_FILE=/tmp/sops-age-key.txt sops --decrypt --input-type dotenv --output-type dotenv secrets.prod.enc.env \
            | grep -v '^#' | grep -v '^[[:space:]]*$' | while IFS='=' read -r key value; do
              echo "::add-mask::${value}"
              echo "${key}=${value}" >> $GITHUB_ENV
            done

      - name: Install dependencies
        run: pnpm install

      - name: Build macOS (Universal)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm build:macos

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: pollis-macos
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install sops
        run: choco install sops

      - name: Decrypt production secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        shell: bash
        run: |
          echo "$SOPS_AGE_KEY" > /tmp/sops-age-key.txt
          unset SOPS_AGE_KEY
          SOPS_AGE_KEY_FILE=/tmp/sops-age-key.txt sops --decrypt --input-type dotenv --output-type dotenv secrets.prod.enc.env \
            | grep -v '^#' | grep -v '^[[:space:]]*$' | while IFS='=' read -r key value; do
              echo "::add-mask::${value}"
              echo "${key}=${value}" >> $GITHUB_ENV
            done

      - name: Install dependencies
        run: pnpm install

      - name: Install OpenSSL via vcpkg
        shell: bash
        run: |
          vcpkg install openssl:x64-windows-static-md
          echo "OPENSSL_DIR=$VCPKG_INSTALLATION_ROOT/installed/x64-windows-static-md" >> $GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $GITHUB_ENV

      - name: Build Windows
        shell: bash
        run: pnpm build:windows

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: pollis-windows
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev

      - name: Install sops
        run: |
          curl -LO https://github.com/getsops/sops/releases/download/v3.9.1/sops-v3.9.1.linux.amd64
          chmod +x sops-v3.9.1.linux.amd64
          sudo mv sops-v3.9.1.linux.amd64 /usr/local/bin/sops

      - name: Decrypt production secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          echo "$SOPS_AGE_KEY" > /tmp/sops-age-key.txt
          unset SOPS_AGE_KEY
          SOPS_AGE_KEY_FILE=/tmp/sops-age-key.txt sops --decrypt --input-type dotenv --output-type dotenv secrets.prod.enc.env \
            | grep -v '^#' | grep -v '^[[:space:]]*$' | while IFS='=' read -r key value; do
              echo "::add-mask::${value}"
              echo "${key}=${value}" >> $GITHUB_ENV
            done

      - name: Install dependencies
        run: pnpm install

      - name: Build Linux
        run: pnpm build:linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: pollis-linux
          path: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install sops
        run: |
          curl -LO https://github.com/getsops/sops/releases/download/v3.9.1/sops-v3.9.1.linux.amd64
          chmod +x sops-v3.9.1.linux.amd64
          sudo mv sops-v3.9.1.linux.amd64 /usr/local/bin/sops

      - name: Decrypt production secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          echo "$SOPS_AGE_KEY" > /tmp/sops-age-key.txt
          unset SOPS_AGE_KEY
          SOPS_AGE_KEY_FILE=/tmp/sops-age-key.txt sops --decrypt --input-type dotenv --output-type dotenv secrets.prod.enc.env \
            | grep -v '^#' | grep -v '^[[:space:]]*$' | while IFS='=' read -r key value; do
              echo "::add-mask::${value}"
              echo "${key}=${value}" >> $GITHUB_ENV
            done

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts with version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          for f in artifacts/pollis-macos/*.dmg; do
            mv "$f" "artifacts/pollis-macos/pollis-${VERSION}-macos.dmg"
          done
          for f in artifacts/pollis-windows/*.exe; do
            mv "$f" "artifacts/pollis-windows/pollis-${VERSION}-windows.exe"
          done
          for f in artifacts/pollis-linux/*.AppImage; do
            mv "$f" "artifacts/pollis-linux/pollis-${VERSION}-linux.AppImage"
          done

      - name: Upload to R2
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ENDPOINT="https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws s3 cp "artifacts/pollis-macos/pollis-${VERSION}-macos.dmg" "s3://pollis/releases/${VERSION}/pollis-${VERSION}-macos.dmg" --endpoint-url "${ENDPOINT}"
          aws s3 cp "artifacts/pollis-windows/pollis-${VERSION}-windows.exe" "s3://pollis/releases/${VERSION}/pollis-${VERSION}-windows.exe" --endpoint-url "${ENDPOINT}"
          aws s3 cp "artifacts/pollis-linux/pollis-${VERSION}-linux.AppImage" "s3://pollis/releases/${VERSION}/pollis-${VERSION}-linux.AppImage" --endpoint-url "${ENDPOINT}"
        env:
          AWS_ACCESS_KEY_ID: ${{ env.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.R2_SECRET_KEY }}
          AWS_DEFAULT_REGION: auto

      - name: Publish latest.json to R2
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ENDPOINT="https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"
          echo "{\"version\":\"${VERSION}\",\"macos\":\"https://cdn.pollis.com/releases/${VERSION}/pollis-${VERSION}-macos.dmg\",\"windows\":\"https://cdn.pollis.com/releases/${VERSION}/pollis-${VERSION}-windows.exe\",\"linux\":\"https://cdn.pollis.com/releases/${VERSION}/pollis-${VERSION}-linux.AppImage\"}" > latest.json
          aws s3 cp latest.json "s3://pollis/releases/latest.json" --endpoint-url "${ENDPOINT}" --content-type "application/json" --cache-control "no-cache"
        env:
          AWS_ACCESS_KEY_ID: ${{ env.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.R2_SECRET_KEY }}
          AWS_DEFAULT_REGION: auto

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/pollis-macos/*.dmg
            artifacts/pollis-windows/*.exe
            artifacts/pollis-linux/*.AppImage
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
