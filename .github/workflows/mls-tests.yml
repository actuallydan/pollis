# CI gate for MLS correctness: DS serializer, MLS crypto/state-machine, and the
# multi-client integration flows harness. These are the tests that protect the
# "invalid states unrepresentable" / bulletproof-membership invariants
# (docs/backend-core-invariants.md). Building pollis-core pulls the native media
# stack (libwebrtc / cpal / webrtc-audio-processing) and the flows harness pulls
# Tauri (webkit), so this needs the same Linux system deps as a desktop build.
name: MLS & delivery tests

on:
  pull_request:
    # Skip the heavy Rust gate for PRs that can't affect it — frontend, the
    # marketing site, and docs/markdown only. Uses paths-ignore (not an
    # allow-list) so any Rust/workspace change still triggers it; only the
    # listed pure-non-Rust surfaces are exempt. NOTE: don't mark this a
    # *required* check under branch protection while path-filtered — GitHub
    # leaves required-but-skipped checks pending forever, which would wedge
    # frontend-only PRs. Gate merges on it via the ruleset's "skipped = pass"
    # option, or keep it advisory.
    paths-ignore:
      - 'frontend/**'
      - 'website/**'
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: mls-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    # 24.04, not 22.04: src-tauri/build.rs compiles pollis-capture-linux, whose
    # libspa 0.9 bindgen needs PipeWire >= 1.0 headers (same reason the release
    # workflow's build-capture-helper job runs on 24.04). No AppImage is built
    # here, so the 22.04 glibc-floor concern doesn't apply.
    runs-on: ubuntu-24.04
    env:
      # The flows test binary links the whole native stack (Tauri + libwebrtc +
      # livekit + cpal); with full DWARF it grew large enough to crash the runner's
      # linker (`ld ... signal 7 [Bus error]` — link-time memory/disk exhaustion).
      # Tests don't need debuginfo (assertions print their own context / op
      # sequences, not backtraces), so drop it to shrink the binary and the link.
      CARGO_PROFILE_TEST_DEBUG: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
    steps:
      - uses: actions/checkout@v4

      # Reclaim ~20-30 GB of preinstalled toolchains we don't use, so linking the
      # large native test binary can't exhaust the runner's disk/tmpfs (the other
      # trigger for the `ld` bus error).
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost /opt/hostedtoolcache/CodeQL /usr/local/.ghcup || true
          sudo docker image prune --all --force || true
          df -h /

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri

      # Same recipe as the desktop-release Linux job: webkit/gtk for Tauri,
      # alsa/pulse/pipewire + libva for the media stack, meson+ninja+clang for
      # webrtc-audio-processing-sys's vendored C++ build.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            libasound2-dev \
            libpulse-dev \
            libpipewire-0.3-dev \
            libva-dev \
            libdbus-1-dev \
            cmake \
            clang \
            ninja-build

      - name: Install meson (newer than apt)
        run: |
          python3 -m pip install --user 'meson>=1.3'
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # The flows harness backs "remote Turso" with a LOCAL libsql file, so these
      # are placeholders — Config::for_test only requires the keys to be present.
      # No real credentials touch the test path.
      - name: Provision .env.test
        run: |
          cat > .env.test <<'EOF'
          TURSO_URL=libsql://placeholder.invalid
          TURSO_TOKEN=placeholder
          EOF

      # Cheap and media-free — fast signal that the DS serializer holds.
      - name: DS serializer unit tests (pollis-delivery)
        run: cargo test -p pollis-delivery

      # openmls-level MLS state-machine tests (mls/tests.rs, reconcile, etc.).
      - name: MLS unit tests (pollis-core)
        if: ${{ !cancelled() }}
        run: cargo test -p pollis-core

      # Multi-client integration harness against the real in-process Delivery
      # Service — the base for the adversarial recovery suite.
      - name: MLS integration flows harness
        if: ${{ !cancelled() }}
        working-directory: src-tauri
        run: cargo test --features test-harness --test flows
