# CI gate for MLS correctness: DS serializer, MLS crypto/state-machine, and the
# multi-client integration flows harness. These are the tests that protect the
# "invalid states unrepresentable" / bulletproof-membership invariants
# (docs/backend-core-invariants.md). Building pollis-core pulls the native media
# stack (libwebrtc / cpal / webrtc-audio-processing) and the flows harness pulls
# Tauri (webkit), so this needs the same Linux system deps as a desktop build.
name: MLS & delivery tests

on:
  pull_request:
    # Skip the heavy Rust gate for PRs that can't affect it — frontend, the
    # marketing site, and docs/markdown only. Uses paths-ignore (not an
    # allow-list) so any Rust/workspace change still triggers it; only the
    # listed pure-non-Rust surfaces are exempt. NOTE: don't mark this a
    # *required* check under branch protection while path-filtered — GitHub
    # leaves required-but-skipped checks pending forever, which would wedge
    # frontend-only PRs. Gate merges on it via the ruleset's "skipped = pass"
    # option, or keep it advisory.
    paths-ignore:
      - 'frontend/**'
      - 'website/**'
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:
    inputs:
      marathon_ops:
        description: "Marathon soak: number of ops in the single long sequence"
        required: false
        default: "300"
      marathon_actors:
        description: "Marathon soak: actor pool size"
        required: false
        default: "6"
  # Nightly continuous soak (M3, docs/machine-checked-correctness-design.md §5.4).
  # Runs the marathon at a meaningful size (500 ops / 8 actors — see the marathon
  # step's env fallbacks) so deep-churn divergence gets soaked every night; a
  # failure fails the job red and uploads the failing op sequence as a durable
  # artifact for one-step promotion to a deterministic regression.
  schedule:
    - cron: "0 7 * * *"

concurrency:
  group: mls-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    # 24.04, not 22.04: src-tauri/build.rs compiles pollis-capture-linux, whose
    # libspa 0.9 bindgen needs PipeWire >= 1.0 headers (same reason the release
    # workflow's build-capture-helper job runs on 24.04). No AppImage is built
    # here, so the 22.04 glibc-floor concern doesn't apply.
    runs-on: ubuntu-24.04
    env:
      # The flows test binary links the whole native stack (Tauri + libwebrtc +
      # livekit + cpal); with full DWARF it grew large enough to crash the runner's
      # linker (`ld ... signal 7 [Bus error]` — link-time memory/disk exhaustion).
      # Tests don't need debuginfo (assertions print their own context / op
      # sequences, not backtraces), so drop it to shrink the binary and the link.
      CARGO_PROFILE_TEST_DEBUG: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
    steps:
      - uses: actions/checkout@v4

      # Reclaim ~20-30 GB of preinstalled toolchains we don't use, so linking the
      # large native test binary can't exhaust the runner's disk/tmpfs (the other
      # trigger for the `ld` bus error).
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost /opt/hostedtoolcache/CodeQL /usr/local/.ghcup || true
          sudo docker image prune --all --force || true
          df -h /

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri

      # Same recipe as the desktop-release Linux job: webkit/gtk for Tauri,
      # alsa/pulse/pipewire + libva for the media stack, meson+ninja+clang for
      # webrtc-audio-processing-sys's vendored C++ build.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            libasound2-dev \
            libpulse-dev \
            libpipewire-0.3-dev \
            libva-dev \
            libdbus-1-dev \
            cmake \
            clang \
            ninja-build

      - name: Install meson (newer than apt)
        run: |
          python3 -m pip install --user 'meson>=1.3'
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # The flows harness backs "remote Turso" with a LOCAL libsql file, so these
      # are placeholders — Config::for_test only requires the keys to be present.
      # No real credentials touch the test path.
      - name: Provision .env.test
        run: |
          cat > .env.test <<'EOF'
          TURSO_URL=libsql://placeholder.invalid
          TURSO_TOKEN=placeholder
          EOF

      # Cheap and media-free — fast signal that the DS serializer holds.
      - name: DS serializer unit tests (pollis-delivery)
        run: cargo test -p pollis-delivery

      # openmls-level MLS state-machine tests (mls/tests.rs, reconcile, etc.).
      - name: MLS unit tests (pollis-core)
        if: ${{ !cancelled() }}
        run: cargo test -p pollis-core

      # pollis-tui unit + smoke tests (the headless in-process-DS rig — no
      # webkit/ALSA). Nothing ran these before, so DS-spine changes could regress
      # the TUI's sync path unnoticed (#487). The smoke rig applies the same
      # baseline + post-baseline log migrations as production.
      - name: TUI unit + smoke tests (pollis-tui)
        if: ${{ !cancelled() }}
        run: cargo test -p pollis-tui

      # Multi-client integration harness against the real in-process Delivery
      # Service — the base for the adversarial recovery suite.
      - name: MLS integration flows harness
        if: ${{ !cancelled() }}
        working-directory: src-tauri
        run: cargo test --features test-harness --test flows

      # Marathon soak: ONE crazy-long generated sequence (hundreds of ops, larger
      # actor pool, messages + churn + faults) through the shadow-oracle
      # convergence check. Runs on manual dispatch AND on the nightly `schedule:`
      # above (the M3 continuous soak) — too heavy for the per-PR gate; the test is
      # `#[ignore]`d so normal runs skip it.
      #
      # Sizing: `workflow_dispatch` uses the input defaults (300/6, or whatever the
      # operator typed). Scheduled runs have no inputs, so `github.event.inputs.*`
      # is empty and the `||` fallbacks pin the nightly soak at 500 ops / 8 actors.
      #
      # `set -o pipefail` so a marathon failure survives the `tee` and the step
      # (and the job) goes RED — no silent swallow. The full stdout/stderr is teed
      # to a log so the panic's embedded failing op sequence (the repro of record —
      # MLS RNG isn't seedable, so the op sequence, not a seed, is what replays) can
      # be uploaded and promoted to a deterministic regression.
      - name: MLS marathon soak
        id: marathon
        if: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && !cancelled() }}
        working-directory: src-tauri
        env:
          MARATHON_OPS: ${{ github.event.inputs.marathon_ops || '500' }}
          MARATHON_ACTORS: ${{ github.event.inputs.marathon_actors || '8' }}
        run: |
          set -o pipefail
          cargo test --features test-harness --test flows -- \
            --ignored --nocapture model_marathon_convergence 2>&1 \
            | tee marathon-soak.log

      # On a marathon FAILURE, distil the failing op sequence out of the teed log
      # into its own file (the panic message embeds it as `op sequence (N ops):
      # [...]`). Both the raw log and the distilled sequence are uploaded below.
      # Promotion runbook: docs/machine-checked-correctness-design.md §5.4.
      - name: Extract failing op sequence
        if: ${{ failure() && steps.marathon.outcome == 'failure' }}
        working-directory: src-tauri
        run: |
          {
            echo "# Marathon soak failure — failing op sequence (the repro of record)."
            echo "# Promote per docs/machine-checked-correctness-design.md §5.4:"
            echo "# paste the Op vector below into a fixed-sequence regression in"
            echo "# src-tauri/tests/flows/model.rs (or adversarial.rs)."
            echo
            grep -F 'op sequence' marathon-soak.log || \
              echo "(no 'op sequence' line found — see marathon-soak.log for the raw failure)"
          } > marathon-failing-op-sequence.txt
          cat marathon-failing-op-sequence.txt

      # Durable CI artifact so the failing sequence outlives the runner and can be
      # promoted to a deterministic regression. `if: failure()` gated on the
      # marathon step specifically, so an unrelated earlier-step failure doesn't
      # upload a stale/empty log.
      - name: Upload marathon failure artifact
        if: ${{ failure() && steps.marathon.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: marathon-failing-op-sequence
          path: |
            src-tauri/marathon-failing-op-sequence.txt
            src-tauri/marathon-soak.log
          retention-days: 90
          if-no-files-found: warn
