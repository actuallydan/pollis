name: Relay image

# Build + test pollis-relay and publish its container image to GHCR (design §7
# first-party pool node). MANUAL ONLY (workflow_dispatch) with an optional `ref`
# input — the relay deploys on the VPS/host model (a public UDP/QUIC port), NOT
# Cloudflare Workers, so this workflow only BUILDS + PUBLISHES the image; there is
# no relay host infra yet, so it wires NO auto-deploy. An operator pulls the
# published image onto a provisioned host per docs/relay-operations.md.
#
# Even though the DS moved OFF GHCR to Cloudflare Containers (#515), the relay uses
# GHCR: it is the VPS/host model (like LiveKit), so a plain pullable image is the
# right shape. Job 2 gates on Job 1 (green tests) before publishing.
#
# GHCR PUBLISH PERMISSION: publishing to ghcr.io/actuallydan/pollis-relay needs
# `packages: write` (granted below via GITHUB_TOKEN). If the org restricts GHCR,
# an admin must allow the repo's GITHUB_TOKEN to write packages (Org → Packages →
# enable, or grant this repo access) — the workflow is otherwise correct; see
# docs/deployments.md (Relay pool).

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (branch, tag, or SHA)
        required: false
        default: main
      publish:
        description: Publish the image to GHCR (uncheck to build-only, e.g. a dry run)
        type: boolean
        required: false
        default: true
  pull_request:
    paths:
      - 'pollis-relay/**'
      - 'pollis-device-cert/**'
      - '.github/workflows/relay-image.yml'
  push:
    branches: [main]
    paths:
      - 'pollis-relay/**'
      - 'pollis-device-cert/**'
      - '.github/workflows/relay-image.yml'

permissions:
  contents: read

concurrency:
  group: relay-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/actuallydan/pollis-relay

jobs:
  # Gate the image on green tests: the relay itself + the shared offline device-cert
  # primitive it verifies handshakes against (a drift there would break auth).
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ${{ inputs.ref || github.sha }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test (pollis-relay + pollis-device-cert)
        run: cargo test -p pollis-relay -p pollis-device-cert

  # Build the container image and (on dispatch/push, not PRs) publish to GHCR.
  #
  # MULTI-ARCH (amd64 + arm64) — arm64 is REQUIRED, not a nicety: the hydra's AWS
  # pool (infra/relay-hydra/, #616) runs Graviton `t4g.nano` nodes because the §0
  # budget math depends on it. An amd64-only image makes every node fail at boot
  # with `no matching manifest for linux/arm64/v8`, cloud-init aborts, and the ASG
  # happily keeps billing for instances that never run the relay.
  #
  # Each platform builds on its OWN NATIVE RUNNER (free for public repos) and pushes
  # by digest; the `manifest` job then stitches the digests into one tag. Native
  # beats QEMU here by a wide margin — cross-emulating a release build of the Rust
  # workspace (ring's assembly, quinn, rustls) turns minutes into tens of minutes.
  image:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      # Required to push the image to GHCR with the built-in GITHUB_TOKEN.
      packages: write
    steps:
      - name: Checkout ${{ inputs.ref || github.sha }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Resolve build SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      # Publish only on a manual dispatch (publish=true) or a push to main — never
      # on a PR from a fork (no GHCR write, and untrusted). PRs build-only to prove
      # the Dockerfile still assembles.
      - name: Decide publish
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "push=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.publish }}" != "true" ]; then
            echo "push=false" >> "$GITHUB_OUTPUT"
          else
            echo "push=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: steps.mode.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build from the REPO ROOT so the whole cargo workspace resolves; bake the
      # git SHA so /version reports the running build (the DS #509 tripwire shape).
      #
      # PR / build-only: just prove this platform still assembles. No push, so no
      # digest to hand the manifest job.
      - name: Build image (build-only)
        if: steps.mode.outputs.push != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: pollis-relay/Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          build-args: |
            GIT_SHA=${{ steps.sha.outputs.sha }}

      # Publish path: push an untagged, per-platform image and record its digest.
      # Tagging happens once, in `manifest` — tagging here would have the two
      # platforms race to overwrite `:latest` with a single-arch image, which is
      # exactly the failure this job exists to prevent.
      - name: Build + push by digest
        id: build
        if: steps.mode.outputs.push == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: pollis-relay/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            GIT_SHA=${{ steps.sha.outputs.sha }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        if: steps.mode.outputs.push == 'true'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: steps.mode.outputs.push == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Stitch the per-platform digests into ONE multi-arch tag. Without this the
  # registry holds two unrelated single-arch images and no manifest list, so an
  # arm64 node still finds no matching manifest.
  manifest:
    needs: image
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout ${{ inputs.ref || github.sha }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Resolve build SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list + push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:${{ steps.sha.outputs.sha }}" \
            -t "${IMAGE}:latest" \
            $(printf "${IMAGE}@sha256:%s " *)

      # Fail loudly if arm64 is somehow missing — that is the exact regression that
      # silently bricks every Graviton node in the hydra pool.
      - name: Verify both platforms are present
        run: |
          docker buildx imagetools inspect "${IMAGE}:latest" --raw > /tmp/manifest.json
          cat /tmp/manifest.json
          for arch in amd64 arm64; do
            if ! grep -q "\"architecture\": *\"$arch\"" /tmp/manifest.json; then
              echo "::error::manifest list is missing linux/$arch"
              exit 1
            fi
          done
          echo "manifest list contains both linux/amd64 and linux/arm64"
