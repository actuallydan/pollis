[build]
rustflags = []

[target.aarch64-apple-darwin]
# -ObjC: ensure Objective-C categories are loaded from static libs (fixes WebRTC crash)
# -rpath /usr/lib/swift: where macOS 12+ ships the Swift runtime (incl. libswift_Concurrency)
#   in the dyld cache. screencapturekit's Swift bridge links those libs by name but
#   doesn't embed the standard Swift rpath, so dyld can't find them at launch.
rustflags = [
    "-C", "link-arg=-ObjC",
    "-C", "link-arg=-Wl,-rpath,/usr/lib/swift",
]

[target.aarch64-apple-darwin.env]
# Screen-share uses SCContentSharingPicker (macOS 14+) so the user can pick
# display / window / app — matches xdg-desktop-portal on Linux. Bumped from
# 12.3 for that. Swift Concurrency from /usr/lib/swift/ is still resolved via
# the -rpath above.
MACOSX_DEPLOYMENT_TARGET = "14.0"

[target.x86_64-apple-darwin]
rustflags = [
    "-C", "link-arg=-ObjC",
    "-C", "link-arg=-Wl,-rpath,/usr/lib/swift",
]

[target.x86_64-apple-darwin.env]
MACOSX_DEPLOYMENT_TARGET = "14.0"

[target.x86_64-pc-windows-msvc]
# Use static CRT to match LiveKit WebRTC libraries (which use /MT)
rustflags = ["-C", "target-feature=+crt-static"]

[env]
# Force C++17 and suppress warnings to work around WebRTC header issues
# -std=c++17: Avoids C++20 iterator concepts issues with rust::Slice
# -w: Suppress all warnings (prevents warning-as-error issues across GCC versions)
# -fpermissive: Allows method names that shadow class names (Network() returning Network*)
CXXFLAGS = "-std=c++17 -w -fpermissive"

[target.x86_64-pc-windows-msvc.env]
# Windows: Use /MT (static runtime) to match LiveKit WebRTC libraries
# The prebuilt WebRTC libs from LiveKit use MT_StaticRelease
CXXFLAGS = "/std:c++17 /MT /W0"
